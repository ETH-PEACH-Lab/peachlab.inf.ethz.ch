sans-serif,\\\"Apple Color Emoji\\\",\\\"Segoe UI Emoji\\\"\",\"height\":\"100vh\",\"textAlign\":\"center\",\"display\":\"flex\",\"flexDirection\":\"column\",\"alignItems\":\"center\",\"justifyContent\":\"center\"},\"children\":[\"$\",\"div\",null,{\"children\":[[\"$\",\"style\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"body{color:#000;background:#fff;margin:0}.next-error-h1{border-right:1px solid rgba(0,0,0,.3)}@media (prefers-color-scheme:dark){body{color:#fff;background:#000}.next-error-h1{border-right:1px solid rgba(255,255,255,.3)}}\"}}],[\"$\",\"h1\",null,{\"className\":\"next-error-h1\",\"style\":{\"display\":\"inline-block\",\"margin\":\"0 20px 0 0\",\"padding\":\"0 23px 0 0\",\"fontSize\":24,\"fontWeight\":500,\"verticalAlign\":\"top\",\"lineHeight\":\"49px\"},\"children\":404}],[\"$\",\"div\",null,{\"style\":{\"display\":\"inline-block\"},\"children\":[\"$\",\"h2\",null,{\"style\":{\"fontSize\":14,\"fontWeight\":400,\"lineHeight\":\"49px\",\"margin\":0},\"children\":\"This page could not be found.\"}]}]]}]}]],\"$undefined\",[]],\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]}],[\"$\",\"$L7\",null,{}]]}]}]}]]}],{\"children\":[\"projects\",[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L6\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[[\"slug\",\"stepmind\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L6\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$L8\",\"$undefined\",null,[\"$\",\"$L9\",null,{\"children\":[\"$La\",\"$Lb\",null]}]]}],{},null,false]},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$1\",\"A8jhy5R-fvLjuGKpDMdSS\",{\"children\":[[\"$\",\"$Lc\",null,{\"children\":\"$Ld\"}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],[\"$\",\"$Le\",null,{\"children\":\"$Lf\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$10\",\"$undefined\"],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"11:I[33063,[\"820\",\"static/chunks/820-ab19ab142069f4e1.js\",\"90\",\"static/chunks/90-e0ee7488d9315342.js\",\"922\",\"static/chunks/922-063d40b7fbd904fb.js\",\"419\",\"static/chunks/app/projects/%5Bslug%5D/page-98c4803e1ea6615f.js\"],\"Image\"]\n12:I[96105,[\"820\",\"static/chunks/820-ab19ab142069f4e1.js\",\"90\",\"static/chunks/90-e0ee7488d9315342.js\",\"922\",\"static/chunks/922-063d40b7fbd904fb.js\",\"419\",\"static/chunks/app/projects/%5Bslug%5D/page-98c4803e1ea6615f.js\"],\"default\"]\n13:T591,Artificial intelligence (AI) enables users to generate data visualizations from natural language descriptions, lowering the barrier to data exploration. However, AI-generated visualizations often present only the final output, lacking transparency and limiting users’ ability to verify, interpret, or refine the results. To address this, we introduce STEPMIND, a generalizable visual framework that enhances explainability and interactivity in AI-generated data analysis pipelines. STEPMIND integrates four dimensions: (1) Stepwise Refinement, allowing users to engage in the AI decision process; (2) Multimodal Explanations, combining natural language, structured notation, direct manipulation, and content visualization for accessible interpretation; (3) Bidirectional Editing, enabling seamless updates across modalities; and (4) Familiar Interaction Models, such as code editor and spreadsheet-based manipulations, to support both technical and non-technical users. To demonstrate its utility, we apply STEPMIND in STAGE, a case study system for AI-assisted data visualization. A within-subject user study (N=20) shows that STAGE significantly improves user confidence and trust, reduces cognitive load, and facilitates both exploratory and corrective refinements. Our findings further suggest that STEPMIND can generalize to broader AI-assisted workflows, offering a visible and interactive approach to explainable AI."])</script><script>self.__next_f.push([1,"8:[\"$\",\"div\",null,{\"className\":\"mx-auto max-w-3xl px-5 py-8\",\"children\":[\"$\",\"div\",null,{\"style\":{\"maxWidth\":\"800px\",\"margin\":\"0 auto\",\"padding\":\"40px 20px\"},\"children\":[[\"$\",\"h2\",null,{\"style\":{\"fontSize\":\"1.75rem\",\"fontWeight\":700},\"children\":\"StepMIND: A Visual Framework for Stepwise, Multimodal, and Bidirectional Explanations of AI-Generated Data Analysis Pipeline\"}],[\"$\",\"p\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Authors:\"}],\" \",\"Yang Wu, Yao Wan, Mennatallah El-Assady, April Yi Wang\"]}],[\"$\",\"p\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Venue:\"}],\" \",\"In Proceedings of the 31th International Conference on Intelligent User Interfaces (IUI 2026)\"]}],[\"$\",\"div\",null,{\"style\":{\"textAlign\":\"center\",\"marginTop\":\"24px\"},\"children\":[\"$\",\"$L11\",null,{\"unoptimized\":true,\"width\":800,\"height\":600,\"src\":\"/peachlab.inf.ethz.ch/assets/teaser/stepmind.jpg\",\"alt\":\"teaser\",\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"maxHeight\":\"500px\",\"objectFit\":\"contain\"}}]}],[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none mb-10\",\"children\":[[\"$\",\"div\",\"div-0\",{\"style\":{\"marginTop\":\"20px\"}}],\"\\n\",[\"$\",\"h4\",\"h4-0\",{\"children\":\"AI as a Black Box in Data Visualization\"}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"As AI-powered tools increasingly generate data visualizations from natural language (NL2Vis), they lower the barrier to data exploration. With a simple prompt like \",[\"$\",\"em\",\"em-0\",{\"children\":\"“Show me sales trends by year”\"}],\", users can quickly obtain charts that once required SQL, scripting, or visualization expertise. However, most AI-generated visualizations are black boxes: users see only the final chart—without insight into how data was transformed, whether the interpretation is correct, or how to fix mistakes when the output is wrong. This limits trust, learning, and meaningful control.\\nWe observe three gaps in current AI-driven data analysis workflows through the lens of the Gulf of Envisioning:\\n\",[\"$\",\"br\",\"br-0\",{}],\"\\n\",[\"$\",\"u\",\"u-0\",{\"children\":\"Capability Gap\"}],\": NL2Vis tools rarely provide modifiable, stepwise explanations, limiting users’ ability to inspect or adjust the AI’s reasoning.\",[\"$\",\"br\",\"br-1\",{}],\"\\n\",[\"$\",\"u\",\"u-1\",{\"children\":\"Instruction Gap\"}],\": Stepwise systems often rely on text templates that presume technical literacy, misaligned with many users’ mental models.\",[\"$\",\"br\",\"br-2\",{}],\"\\n\",[\"$\",\"u\",\"u-2\",{\"children\":\"Intentionality Gap\"}],\": Programming-centric tools restrict direct edits to the underlying workflow, forcing iterative prompting instead of transparent refinement.\",[\"$\",\"br\",\"br-3\",{}]]}],\"\\n\",[\"$\",\"h4\",\"h4-1\",{\"children\":\"StepMIND Framework and Design Principles\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":[\"StepMIND addresses these gaps by combining four ideas: multimodal explanations (visual, textual, instructional), real-time bidirectional editing, a familiar spreadsheet/code interface, and stepwise refinement. Together, these enable a flexible interaction cycle (\",[\"$\",\"strong\",\"strong-0\",{\"children\":\"T↔D↔C↔I↔T\"}],\") that supports inspection, correction, and learning across levels of abstraction.\"]}],\"\\n\",[\"$\",\"h5\",\"h5-0\",{\"children\":\"Stepwise Refinement\"}],\"\\n\",[\"$\",\"div\",\"div-1\",{\"style\":{\"float\":\"right\",\"width\":\"25%\",\"maxWidth\":\"220px\",\"margin\":\"4px 0 8px 24px\",\"textAlign\":\"center\"},\"children\":[\"\\n  \",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/blog/stepmind/stepwise.png\",\"alt\":\"Stepwise Execution Interface\",\"style\":{\"width\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\"}}],\"\\n\"]}],\"\\nThis stepwise approach enables users to verify, modify, and understand visualizations at a granular level by breaking the process into discrete stages such as data selection, filtering, aggregation, and rendering. In our setup, LLMs generate an initial instruction sequence from natural language and data (\",[\"$\",\"strong\",\"strong-0\",{\"children\":\"T→I\"}],\"). To improve control and transparency, StepMIND decomposes this instruction into ordered sub-steps (\",[\"$\",\"strong\",\"strong-1\",{\"children\":\"I1, I2, …, In\"}],\") and executes them sequentially, producing intermediate data content states (\",[\"$\",\"strong\",\"strong-2\",{\"children\":\"C1, C2, …, Cn\"}],\"). Users can refine the visual output by inspecting and editing a specific step (e.g., adjusting a filter or a threshold slider), and the system updates the corresponding intermediate and final states accordingly.\\n\",[\"$\",\"div\",\"div-2\",{\"style\":{\"clear\":\"both\"}}],\"\\n\",[\"$\",\"h5\",\"h5-1\",{\"style\":{\"clear\":\"both\",\"margin\":\"12px 0\"},\"children\":\"Multimodal Grounding\"}],\"\\n\",[\"$\",\"div\",\"div-3\",{\"style\":{\"float\":\"right\",\"width\":\"25%\",\"maxWidth\":\"220px\",\"margin\":\"4px 0 8px 24px\",\"textAlign\":\"center\"},\"children\":[\"\\n  \",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/blog/stepmind/multimodel.png\",\"alt\":\"Multimodal Synchronization\",\"style\":{\"width\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\"}}],\"\\n\"]}],\"\\nTo support users of varying expertise, StepMIND provides multimodal explanations at each step. From every instruction \",[\"$\",\"strong\",\"strong-3\",{\"children\":\"In\"}],\", the system prompts the LLM to generate a self-explanation in natural language \",[\"$\",\"strong\",\"strong-4\",{\"children\":\"Tn\"}],\" (\",[\"$\",\"strong\",\"strong-5\",{\"children\":\"In→Tn\"}],\"). The textual explanation at each step, combined with the current data content, yields direct manipulation elements \",[\"$\",\"strong\",\"strong-6\",{\"children\":\"Dn\"}],\" (e.g., sliders, selectors), enabling spreadsheet-style interactions that act on the underlying content (\",[\"$\",\"strong\",\"strong-7\",{\"children\":\"Dn→Cn\"}],\"). Novice users benefit from these grounded, interactive explanations without needing technical knowledge, while expert users can read and edit structured notations (e.g., SQL-/VQL-like clauses) alongside visual outputs to enable fine-grained control, verification, and debugging of complex operations.\\n\",[\"$\",\"div\",\"div-4\",{\"style\":{\"clear\":\"both\"}}],\"\\n\",[\"$\",\"h5\",\"h5-2\",{\"style\":{\"clear\":\"both\",\"margin\":\"12px 0\"},\"children\":\"Bidirectional Editing\"}],\"\\n\",[\"$\",\"div\",\"div-5\",{\"style\":{\"float\":\"right\",\"width\":\"15%\",\"maxWidth\":\"120px\",\"margin\":\"4px 0 8px 24px\",\"textAlign\":\"center\"},\"children\":[\"\\n  \",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/blog/stepmind/bid.png\",\"alt\":\"Bidirectional Architecture\",\"style\":{\"width\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\"}}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":[\"Unlike traditional unidirectional refinement, StepMIND supports seamless bidirectional editing between textual descriptions and visual interfaces. Users move between instruction and explanation (\",[\"$\",\"strong\",\"strong-0\",{\"children\":\"I↔T\"}],\"), explanation and direct manipulation (\",[\"$\",\"strong\",\"strong-1\",{\"children\":\"T↔D\"}],\"), and ultimately across all components (\",[\"$\",\"strong\",\"strong-2\",{\"children\":\"I↔T↔D↔C\"}],\"). For example, clicking on a chart element can trigger related query changes, and updating a textual clause immediately reflects in the visualization. This tight binding creates an efficient, intuitive loop for data exploration and correction.\"]}],\"\\n\",[\"$\",\"div\",\"div-6\",{\"style\":{\"clear\":\"both\"}}],\"\\n\",[\"$\",\"h5\",\"h5-3\",{\"children\":\"Familiar Interaction Models\"}],\"\\n\",[\"$\",\"div\",\"div-7\",{\"style\":{\"float\":\"right\",\"width\":\"15%\",\"maxWidth\":\"120px\",\"margin\":\"4px 0 8px 24px\",\"textAlign\":\"center\"},\"children\":[\"\\n  \",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/blog/stepmind/sheet.png\",\"alt\":\"Spreadsheet View\",\"style\":{\"width\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\"}}],\"\\n\"]}],\"\\nStepMIND draws from familiar paradigms like spreadsheet-based manipulation and block-structured pipelines to lower the barrier for non-experts. Users who prefer tabular interfaces can interact directly with data (\",[\"$\",\"strong\",\"strong-8\",{\"children\":\"T↔D↔C\"}],\"), while those with programming backgrounds can refine workflows via code and instruction (\",[\"$\",\"strong\",\"strong-9\",{\"children\":\"T↔I↔C\"}],\"). By combining text, GUI, and structured instructions, StepMIND forms a closed refinement loop (\",[\"$\",\"strong\",\"strong-10\",{\"children\":\"T↔D↔C↔I↔T\"}],\") that supports a broad spectrum of users in exploring and interpreting data effectively.\\n\",[\"$\",\"div\",\"div-8\",{\"style\":{\"clear\":\"both\"}}],\"\\n\",[\"$\",\"h4\",\"h4-2\",{\"children\":\"STAGE: StepMIND in Action\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"To demonstrate the framework, we built STAGE, an AI-assisted data visualization system based on StepMIND. In STAGE, users can enter a natural language question, view a step-by-step explanation of how the visualization was generated, interactively adjust filters, aggregations, and chart types, and switch seamlessly between explanations, visual controls, and query code. For example, if a user asks for “popular product categories” but later realizes the chart should show total sales instead of counts, they can modify the SELECT/GROUP BY step—without rewriting the entire prompt.\"}],\"\\n\",[\"$\",\"div\",\"div-9\",{\"style\":{\"textAlign\":\"center\",\"border\":\"1px solid #e5e7eb\",\"padding\":\"12px\",\"borderRadius\":\"8px\",\"width\":\"fit-content\",\"margin\":\"20px auto\"},\"children\":[\"\\n   \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://stage.peachhub.inf.ethz.ch/\",\"style\":{\"color\":\"#0073e6\",\"textDecoration\":\"underline\"},\"target\":\"_blank\",\"rel\":\"noopener noreferrer\",\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"Try STAGE\"}]}],\"\\n\"]}],\"\\n\",[\"$\",\"figure\",\"figure-0\",{\"style\":{\"margin\":\"0 auto\",\"width\":\"fit-content\",\"textAlign\":\"center\",\"padding\":\"12px 0\"},\"children\":[\"\\n  \",[\"$\",\"div\",\"div-0\",{\"style\":{\"display\":\"flex\",\"justifyContent\":\"center\"},\"children\":[\"\\n    \",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/blog/stepmind/screenshot4.png\",\"alt\":\"STAGE interface overview\",\"style\":{\"maxWidth\":\"900px\",\"width\":\"100%\",\"borderRadius\":\"10px\",\"border\":\"1px solid #e5e7eb\",\"boxShadow\":\"0 6px 18px rgba(0,0,0,0.08)\"}}],\"\\n  \"]}],\"\\n  \",[\"$\",\"figcaption\",\"figcaption-0\",{\"style\":{\"marginTop\":\"8px\",\"fontSize\":\"0.9rem\",\"color\":\"#6b7280\"},\"children\":\"STAGE overview: switch between Explanations, Visual Controls, and VQL to inspect and refine results step by step.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"h4\",\"h4-3\",{\"children\":\"Generalizability Beyond STAGE\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"While STAGE serves as a concrete instantiation of StepMIND, the framework itself is designed to be domain-agnostic and extendable across AI-driven tasks. Its modular architecture supports integration into interactive query systems, explainable AI tooling, and domain-specific copilots (e.g., slide creation, creative editing). By ensuring adaptability across diverse contexts, StepMIND promotes interpretable, interactive, and user-centric AI workflows beyond data visualization. We also look forward to seeing more works and practices built on the StepMIND framework.\"}],\"\\n\",[\"$\",\"div\",\"div-10\",{\"style\":{\"background\":\"#f3f4f6\",\"borderRadius\":\"10px\",\"padding\":\"8px 30px\",\"marginTop\":\"20px\"},\"children\":[\"\\n  \",[\"$\",\"p\",\"p-0\",{\"style\":{\"margin\":\"6px 0\"},\"children\":[\"\\n    📄 \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3742413.3789070\",\"style\":{\"color\":\"#0073e6\",\"textDecoration\":\"underline\"},\"target\":\"_blank\",\"rel\":\"noopener noreferrer\",\"children\":\"Paper (DOI)\"}],\"\\n    ｜ 📹 \",[\"$\",\"a\",\"a-1\",{\"href\":\"#\",\"style\":{\"color\":\"#0073e6\",\"textDecoration\":\"underline\",\"pointerEvents\":\"none\",\"opacity\":\"0.7\"},\"aria-disabled\":\"true\",\"children\":\"Video (coming soon)\"}],\"\\n  \"]}],\"\\n  \",[\"$\",\"p\",\"p-1\",{\"style\":{\"margin\":\"6px 0\"},\"children\":[\"\\n    \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Citation\"}],\": Wu, Y., Wan, Y., El‑Assady, M., \u0026 Wang, A. Y. (2026). StepMIND: A Visual Framework for Stepwise, Multimodal, and Bidirectional Explanations of AI‑Generated Data Analysis Pipeline. In Proceedings of the 31th International Conference on Intelligent User Interfaces (IUI 2026).\\n  \"]}],\"\\n\"]}]]}],[\"$\",\"$L12\",null,{\"pub\":{\"venue\":\"IUI 2026\",\"id\":\"iui2026a\",\"slug\":\"stepmind\",\"year\":\"2026\",\"title\":\"StepMIND: A Visual Framework for Stepwise, Multimodal, and Bidirectional Explanations of AI-Generated Data Analysis Pipeline\",\"authors\":\"Yang Wu, Yao Wan, Mennatallah El-Assady, April Yi Wang\",\"venue_full\":\"In Proceedings of the 31th International Conference on Intelligent User Interfaces (IUI 2026)\",\"abstract\":\"$13\",\"teaser\":\"/assets/teaser/stepmind.jpg\",\"paper_link\":\"https://doi.org/10.1145/3742413.3789070\",\"is_journal\":false,\"is_featured\":false}}]]}]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
