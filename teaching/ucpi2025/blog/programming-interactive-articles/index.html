[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"h2\",\"h2-0\",{\"children\":\"W9 - Interactive Articles\"}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"When reading turns into exploration and exploration turns into understanding\"}]}],\"\\n\",[\"$\",\"img\",\"img-0\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w9-images/drawing.jpg\",\"alt\":\"drawing\",\"height\":300,\"style\":{\"maxWidth\":\"100%\",\"height\":\"300px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":[\"Society started with storytelling. Then came paintings, then mass-printable text. Today we publish on a web that is effectively \",[\"$\",\"em\",\"em-0\",{\"children\":\"infinitely\"}],\" and \",[\"$\",\"em\",\"em-1\",{\"children\":\"instantaneously\"}],\" copyable. Accessibility is no longer the core bottleneck. Attention is. As low-signal content (AI slop) grows and our attention shrinks, we need formats that help us digest and \",[\"$\",\"em\",\"em-2\",{\"children\":\"understand\"}],\" information more deeply and more quickly.\"]}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"Consider the difference between a description of bubble sort and an animation that shows each swap. Both can teach, but together they teach better, because the learner can connect explanation (“why”) to behavior (“what happens”) in real time.\"}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"What is an interactive article?\"}]}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"An interactive article is not “a blog post with a chart.” It is a document where:\"}],\"\\n\",[\"$\",\"ul\",\"ul-0\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Narrative\"}],\" guides the reader and explains what to look for in the interactive components.\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Interactive elements\"}],\" let the reader explore a visualization, data, parameters, and functions, rather than only observing a single static view.\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"A state model\"}],\" keeps everything consistent. Changing one parameter updates the outcome in a way that depends on all the other parameters.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"A fitting mental model is a debugger.\"}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":[\"A static article tells you \",[\"$\",\"em\",\"em-0\",{\"children\":\"what happened\"}],\", an interactive article lets you step in, change inputs, and observe \",[\"$\",\"em\",\"em-1\",{\"children\":\"what happens under variation\"}],\".\"]}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"This matters especially in computer science. Many CS concepts are fundamentally about behavior across cases, performance under different distributions, failure modes, trade-offs, edge cases. Static images can show one slice but cannot show the landscape.\"}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"Why interactive articles are hard to do well\"}]}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"High-quality interactivity is currently expensive.\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":\"With static writing, you mesh an argument and its figures. With interactive writing, you coordinate narrative, visualization, state, and code, all while ensuring the experience remains coherent. Concretely this means:\"}],\"\\n\",[\"$\",\"ul\",\"ul-1\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":\"designing interaction that teaches rather than distracts\"}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":\"handling state and dependency management\"}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":\"learning unfamiliar tools and ecosystems\"}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":\"dealing with packaging, deployment, and long-term maintenance\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"This overhead can make an article high-quality and high-signal but the cost is most likely double in each way.\"}],\"\\n\",[\"$\",\"h3\",\"h3-2\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"Tooling that tried to reduce the overhead\"}]}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":[\"An attempt to reduce overhead is \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Idyll\"}],\", which uses Markdown as the default authoring surface while supporting reactive components for interactivity. Conlen \u0026 Heer describe the central idea as treating interactivity as part of the document’s structure rather than an afterthought (Conlen \u0026 Heer, 2018).\"]}],\"\\n\",[\"$\",\"img\",\"img-1\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w9-images/idyll.png\",\"alt\":\"idyll\",\"height\":200,\"style\":{\"maxWidth\":\"100%\",\"height\":\"200px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":\"In principle, this lets authors write normally and “drop in” sliders and components without building a brand new web app.\"}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":\"So why didn’t this style become mainstream?\"}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":[\"After Jeffrey Heer helped release Idyll he also tried to launch Distill, a publication that pushed interactive, explorable ML communication. The work required to do research \",[\"$\",\"em\",\"em-0\",{\"children\":\"and\"}],\" write \",[\"$\",\"em\",\"em-1\",{\"children\":\"and\"}],\" build a robust interactive article is substantial (Hohman et al., 2020). For me the time effort was around 3-4 hours to understand the layout and how to navigate and possibilities and then another 2-3 hours for just designing components. Developping more complex ML tasks and making them intuitive is a lot more work and not surprisingly led to a lot of burnouts.\"]}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":\"Interactive pieces in research also introduce frictions:\"}],\"\\n\",[\"$\",\"ul\",\"ul-2\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Maintenance:\"}],\" reactive components break as dependencies/packages evolve\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Archiving:\"}],\" PDFs are stable, code-driven documents are hard to preserve\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Data constraints:\"}],\" large real-world datasets may be too large and too expensive to host for indefinite time\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":\"Interactive articles are often most feasible when explaining algorithms, conceptual models, or carefully curated datasets, cases where the “state space” is meaningful but still small enough to run smoothly. Yet distill went into hiatus in 2021 after most volunteers couldn't keep up with the workload introduced.\"}],\"\\n\",[\"$\",\"h3\",\"h3-3\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"Where interactive articles are going\"}]}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":\"As AI Slop is increasing and the world needs more trustworthy high-signal news and information I can see that interactive articles are one way to go. LLMs can help with the code generation for the visualisations and more focus can be applied to the content and teaching the new concepts rather than writing and coding. As the research community continues to use more LLMs to rewrite and generate content it will be good to have more trust in the work done. As writing code and text is no longer an indicator for quality but understandability, visualisations and explanations are. There will be a new demand for visualisations.\"}],\"\\n\",[\"$\",\"p\",\"p-17\",{\"children\":[\"A slightly more recent direction in research is \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"explorable multiverse analysis\"}],\". Dragicevic et al. argue that many empirical results depend on a chain of reasonable analysis choices, filtering rules, model forms, covariates, thresholds. Traditional papers compress those forks into a single narrative path. The multiverse approach turns the paper into an interface where readers can explore how conclusions change across the space of choices (Dragicevic et al., 2019).\"]}],\"\\n\",[\"$\",\"p\",\"p-18\",{\"children\":[\"Tooling is also moving in this direction. For example, \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Living Papers\"}],\" (Same authors as Idyll) proposes language/tooling support for “augmented scholarly communication” rather than one-off interactive builds (Heer et al., 2023). More recent work explores human–AI co-exploration for crafting research narratives (Zhang et al., 2025).\"]}],\"\\n\",[\"$\",\"p\",\"p-19\",{\"children\":\"The remaining blocker is still incentives and effort. Asking a PhD student to spend an additional one to two weeks to build and maintain a polished interactive layer is often unrealistic. The optimistic bet is that AI-assisted coding and better component ecosystems will reduce that marginal cost, making it easier to prototype interactive elements quickly, validate correctness visually, and publish without bespoke engineering.\"}],\"\\n\",[\"$\",\"p\",\"p-20\",{\"children\":[\"Meanwhile, newsrooms have shown that reusable interactive components can scale. Outlets such as \",[\"$\",\"em\",\"em-0\",{\"children\":\"The New York Times\"}],\" routinely use interactive maps and region-based interfaces for elections and civic information, interfaces that are repeatable across stories rather than handcrafted each time.\"]}],\"\\n\",[\"$\",\"p\",\"p-21\",{\"children\":[\"If this trend continues, the “next web format” may be less about infinite publishing and more about \",[\"$\",\"em\",\"em-0\",{\"children\":\"structured exploration\"}],\": narrative that helps you ask the right questions, plus interfaces that let you test them.\"]}],\"\\n\",[\"$\",\"h3\",\"h3-4\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"Short bio\"}]}],\"\\n\",[\"$\",\"p\",\"p-22\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Dominique Buob\"}],\" is a computer science student focus on making complex data understandable, getting insights and acting on new knowledge gained.\"]}],\"\\n\",[\"$\",\"h3\",\"h3-5\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"References\"}]}],\"\\n\",[\"$\",\"p\",\"p-23\",{\"children\":[\"Conlen, M., \u0026 Heer, J. (2018). Idyll: A markup language for authoring and publishing interactive articles on the web. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 31st Annual ACM Symposium on User Interface Software and Technology (UIST ’18)\"}],\". [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3242587.3242600\",\"children\":\"https://doi.org/10.1145/3242587.3242600\"}],\"]\"]}],\"\\n\",[\"$\",\"p\",\"p-24\",{\"children\":[\"Dragicevic, P., Jansen, Y., Sarma, A., Kay, M., \u0026 Chevalier, F. (2019). Increasing the transparency of research papers with explorable multiverse analyses. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 2019 CHI Conference on Human Factors in Computing Systems (CHI ’19)\"}],\" (pp. 1–15). [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3290605.3300295\",\"children\":\"https://doi.org/10.1145/3290605.3300295\"}],\"]\"]}],\"\\n\",[\"$\",\"p\",\"p-25\",{\"children\":[\"Heer, J., Conlen, M., Devireddy, V., Nguyen, T., \u0026 Horowitz, J. (2023). Living Papers: A language toolkit for augmented scholarly communication. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 36th Annual ACM Symposium on User Interface Software and Technology (UIST ’23)\"}],\". [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3586183.3606791\",\"children\":\"https://doi.org/10.1145/3586183.3606791\"}],\"]\"]}],\"\\n\",[\"$\",\"p\",\"p-26\",{\"children\":[\"Hohman, F., Conlen, M., Heer, J., \u0026 Chau, D. H. P. (2020). Communicating with interactive articles. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Distill, 5\"}],\"(9). [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.23915/distill.00028\",\"children\":\"https://doi.org/10.23915/distill.00028\"}],\"]\"]}],\"\\n\",[\"$\",\"p\",\"p-27\",{\"children\":[\"Zhang, R., Ouyang, Y., Shen, L., Tang, Y., Ma, X., Qu, H., \u0026 Xu, X. (2025). PaperBridge: Crafting research narratives through human–AI co-exploration. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 38th Annual ACM Symposium on User Interface Software and Technology (UIST ’25)\"}],\". [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3746059.3747713\",\"children\":\"https://doi.org/10.1145/3746059.3747713\"}],\"]\"]}],\"\\n\",[\"$\",\"p\",\"p-28\",{\"children\":[\"Chen, Z., \u0026 Xia, H. (2022, April). \",[\"$\",\"em\",\"em-0\",{\"children\":\"CrossData: Leveraging text-data connections for authoring data documents\"}],\". In \",[\"$\",\"em\",\"em-1\",{\"children\":\"Proceedings of the 2022 CHI Conference on Human Factors in Computing Systems\"}],\" (pp. 1–15). [\",[\"$\",\"a\",\"a-0\",{\"href\":\"https://hci.ucsd.edu/papers/crossdata.pdf\",\"children\":\"https://hci.ucsd.edu/papers/crossdata.pdf\"}],\"]\"]}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L11\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Dominique Buob\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
