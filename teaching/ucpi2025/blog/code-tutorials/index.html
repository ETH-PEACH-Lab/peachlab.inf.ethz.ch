log-nav-link active\",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Tutorials\"]}]}],[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/no-code-environment/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"$1\",\"h2-0\",{\"children\":[[\"$\",\"h2\",null,{\"children\":\"Learning to Code with AI: Helpful Tool or Illusion of Understanding?\"}],[\"$\",\"p\",null,{\"className\":\"blog-byline\",\"children\":[\"by \",\"Alexandre Ballenghien\"]}]]}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"If you have taken a programming course recently, chances are that you have used an AI tool to generate or explain code. Tools such as ChatGPT are increasingly integrated into how students learn, debug, and experiment. For many students (myself included), AI can reduce frustration and make it easier to move forward when stuck.\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"At the same time, I have noticed an uncomfortable pattern. There are moments when I feel confident after reading and running AI-generated code, yet struggle to reproduce the same logic independently later. This raises an important question: does using AI to generate solutions actually strengthen understanding, or can it create a misleading sense of mastery?\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"Recent research suggests that this tension is not just anecdotal but reflects deeper design challenges in how tutorials, notebooks, and AI systems support learning.\"}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"Why Traditional Tutorials Often Miss Where Students Struggle\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"A common assumption about programming tutorials is that if instructions are clear, learning will follow. However, tutorials are typically static documents. Once published, they cannot observe how students interact with them or where confusion occurs.\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"The Porta system, introduced by Mysore and Guo, proposes “tutorial profiling” as a way to address this limitation [1]. Porta tracks how learners navigate a tutorial webpage, what commands they execute, and what errors they encounter. The goal is not to evaluate students but to provide feedback to tutorial creators about real points of difficulty.\"}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"One key issue highlighted in this work is the “expert blind spot,” where instructors unintentionally omit steps or assume background knowledge because they no longer remember what it feels like to be a beginner [1]. As a student, this resonates strongly. Many tutorial frustrations arise not from dramatic conceptual gaps, but from small, implicit assumptions about setup, environment, or prior experience.\"}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"This problem is not new. Educational research has long emphasized that understanding how learners actually interact with instructional material is essential for improving it. Yet in programming, we often treat tutorials as finished products rather than evolving systems shaped by user behavior.\"}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":\"AI-Generated Code and the Illusion of Learning\"}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"While Porta focuses on improving tutorials from the outside, recent research has examined how learners engage with AI-generated code itself. Kazemitabaar et al. investigate how students interact with solutions produced by large language models and introduce the concept of the “illusion of learning” [2].\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":\"The concern is not that AI provides incorrect code. In fact, AI often generates functional and well-structured solutions. The issue is that students may read and run these solutions, feel that they understand them, and move on without deeply processing the underlying reasoning.\"}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"The researchers explored multiple techniques designed to increase cognitive engagement with AI-generated code [2]. Rather than removing AI assistance, they introduced structured interactions such as requiring students to trace execution, predict variable values, fix injected errors, or reason through the next step in an algorithm before revealing the corresponding line of code.\"}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":\"One particularly effective technique guided learners step by step through the reasoning process before displaying each line of the solution [2]. This approach shifts the focus from consuming an answer to constructing the logic that leads to it.\"}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":\"The findings show that students’ perceived understanding after using AI does not always align with their actual performance on subsequent tasks without AI assistance [2]. This mismatch suggests that ease of use can sometimes mask shallow engagement.\"}],\"\\n\",[\"$\",\"h3\",\"h3-2\",{\"children\":\"Active Engagement Has Always Mattered\"}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":\"Concerns about passive learning did not start with AI. In computing education research, active engagement has long been associated with better learning outcomes. The ICAP framework, for example, distinguishes between passive, active, constructive, and interactive engagement, arguing that deeper forms of engagement lead to stronger learning gains [3].\"}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":\"Several established techniques reflect this idea. Parsons problems require learners to reorder scrambled lines of code rather than writing programs from scratch, encouraging reasoning about structure without overwhelming them with syntax [4]. Code tracing exercises, where students step through execution and predict variable values, are also widely used to develop understanding of program behavior.\"}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":\"Tools such as Python Tutor make program execution visible by showing changes in memory state step by step, helping learners build mental models of how code actually runs [5]. These approaches emphasize that understanding comes not from seeing a correct answer, but from engaging with the process that produces it.\"}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":\"What is interesting about recent AI research is that it does not reject these principles. Instead, it adapts them. Rather than asking whether students should use AI, it asks how interaction with AI can be structured so that it promotes analysis, explanation, and prediction instead of simple acceptance of generated solutions.\"}],\"\\n\",[\"$\",\"h3\",\"h3-3\",{\"children\":\"Rethinking Tutorials and AI as Learning Interfaces\"}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":\"Taken together, the Porta system and the cognitive engagement techniques suggest a broader shift in how we think about programming education tools.\"}],\"\\n\",[\"$\",\"p\",\"p-17\",{\"children\":\"Traditional tutorials often lack visibility into real learner struggles. AI tools, while powerful, can reduce the cognitive effort required to construct solutions. Both systems influence how learning unfolds, but neither guarantees understanding by default.\"}],\"\\n\",[\"$\",\"p\",\"p-18\",{\"children\":\"This suggests that tutorials and AI systems should be treated not merely as content delivery mechanisms, but as interfaces that shape cognitive processes. Small design choices, such as prompting a prediction before revealing code or surfacing common failure points, can significantly alter how deeply a learner engages with material.\"}],\"\\n\",[\"$\",\"p\",\"p-19\",{\"children\":\"For students, this also highlights a personal responsibility. The way AI is used matters. Reading and executing code is not the same as reasoning through it. Deliberate engagement, even when not strictly required, may be necessary to convert exposure into durable knowledge.\"}],\"\\n\",[\"$\",\"h3\",\"h3-4\",{\"children\":\"Looking Ahead\"}],\"\\n\",[\"$\",\"p\",\"p-20\",{\"children\":\"AI-assisted programming is unlikely to disappear. If anything, it will become more integrated into educational platforms and development environments. The key question is how these tools can be designed to support learning rather than simply accelerate output.\"}],\"\\n\",[\"$\",\"p\",\"p-21\",{\"children\":\"Research points toward hybrid approaches in which AI systems incorporate structured engagement mechanisms, and tutorials adapt based on real learner behavior [1][2]. At the same time, decades of work in computing education remind us that deep learning requires active cognitive involvement [3][4][5].\"}],\"\\n\",[\"$\",\"p\",\"p-22\",{\"children\":\"For students like myself, this means being more reflective about how I interact with generated code. Efficiency is valuable, especially under time pressure. But genuine understanding requires effort. The goal should not only be to produce working programs, but to build the ability to reason about them independently.\"}],\"\\n\",[\"$\",\"h3\",\"h3-5\",{\"children\":\"References\"}],\"\\n\",[\"$\",\"p\",\"p-23\",{\"children\":[\"[1] Mysore, A., \u0026 Guo, P. J. (2018). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Porta: Profiling software tutorials using operating-system-wide activity tracing\"}],\". Proceedings of the ACM Symposium on User Interface Software and Technology.\"]}],\"\\n\",[\"$\",\"p\",\"p-24\",{\"children\":[\"[2] Kazemitabaar, M., Huang, O., Suh, S., Henley, A. Z., \u0026 Grossman, T. (2025). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Exploring the design space of cognitive engagement techniques with AI-generated code for enhanced learning\"}],\". Proceedings of the International Conference on Intelligent User Interfaces.\"]}],\"\\n\",[\"$\",\"p\",\"p-25\",{\"children\":[\"[3] Chi, M. T. H., \u0026 Wylie, R. (2014). \",[\"$\",\"em\",\"em-0\",{\"children\":\"The ICAP framework: Linking cognitive engagement to active learning outcomes\"}],\". Educational Psychologist, 49(4), 219–243.\"]}],\"\\n\",[\"$\",\"p\",\"p-26\",{\"children\":[\"[4] Parsons, D., \u0026 Haden, P. (2006). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Parsons programming puzzles: A fun and effective learning tool for first programming courses\"}],\". Proceedings of the 8th Australasian Conference on Computing Education.\"]}],\"\\n\",[\"$\",\"p\",\"p-27\",{\"children\":[\"[5] Guo, P. J. (2013). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Online Python Tutor: Embeddable web-based program visualization for CS education\"}],\". Proceedings of the ACM SIGCSE Technical Symposium on Computer Science Education.\"]}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L11\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Alexandre Ballenghien\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
