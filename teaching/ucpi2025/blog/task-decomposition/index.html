me\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Interactive Articles\"]}]}],[\"$\",\"li\",\"programming-scenes\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/programming-scenes\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Scenes\"]}]}],[\"$\",\"li\",\"developer-community\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/developer-community\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W10\"}],\"Developer Community\"]}]}],[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-clustering\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Clustering\"]}]}],[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-tutorials\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Tutorials\"]}]}],[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/no-code-environment\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/accessibility\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"h1\",\"h1-0\",{\"children\":\"ChainForge\"}],\"\\n\",[\"$\",\"h2\",\"h2-0\",{\"children\":\"Introduction\"}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"In the last few years, large language models (LLM) have moved from research labs to everyday workflows with incredible speed. ChatGPT alone reaches more than 700 million weekly users [1]. LLMs help users draft emails, generate code, analyze data and even assist with medical diagnoses. However, this rapid development has raised serious questions regarding the correctness and reliability of these tools.\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"For example, asking an LLM the same question twice might lead to two very different answers. For coding or drafting emails, this might not be an issue, but for medical and legal analysis, this unpredictability can lead to serious consequences like misdiagnosis or false recommendations.\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"To address this problem, one would need to evaluate LLMs. However, evaluating large language models requires knowledge of APIs, machine learning, and programming. However, most LLM users do not possess these technical skills [2]. This challenge highlight the need for powerful and accessible tools that help users gain a more comprehensive understanding of LLM behaviour, beyond a single prompt or chat. This is where ChainForge comes in.\"}],\"\\n\",[\"$\",\"h2\",\"h2-1\",{\"children\":\"ChainForge\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"Released in 2023, ChainForge is an open-source visual toolkit designed to make prompt evaluation accessible for everyone. Instead of writing code to test prompts, users build visual pipelines by connecting nodes that represent different input types, multiple models and processor nodes. This allows users to systematically evaluate their hypotheses based on individual criteria [2]. Figure 1 shows an example of a pipeline that evaluates LLM performance on basic math problems across different models.\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":[[\"$\",\"img\",\"img-0\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/image.png\",\"alt\":\"ChainForge\",\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 1:  Ground truth evaluation for math problems\"}]]}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"ChainForge's real strength lies in its prompt template system. Instead of testing just one static prompt users can generate templates with variables. A computer science professor might create the following template: Generate a coding example about {topic} in {programming language}. The professor can then specify the topics (e.g. algorithm, data structure) and the languages (Python, Java etc.). ChainForge will then automatically generate all possible combinations and test them across the chosen model. Furthermore, it is also possible to send a prompt multiple times to the same model, in order to check the consistency of answers.\"}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"ChainForge also allows more complex pipelines. Users can create data processing pipelines. For example, users could create a pipeline that takes a datasheet, transforms it using a processing node and finally use a LLM to create an informative summary that analyses the results of the evaluation [2].\"}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"If you want to explore ChainForge yourself, you can try it directly in your browser at chainforge.ai/play.\"}],\"\\n\",[\"$\",\"h2\",\"h2-2\",{\"children\":\"Related tools\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":\"ChainForge isn't the only tool tackling prompt engineering challenges. Prompt-Aid also contains a visual interface but focuses on iteratively improving a single prompt. When you enter a prompt in Prompt-Aid, it uses keyword extraction and paraphrasing to suggest improvement. For example, it will suggest using a synonym because it leads to clearer and more reliable results. Consequently, it helps in optimizing a specific use case but fails to compare models or consistency across multiple tests [3]. However, Prompt-Aid and ChainForge can work together by first using Prompt-Aid to generate a great prompt and then use ChainForge to systematically test it.\"}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"Another tool proposes two distinct decomposition methods, Stepwise and Phasewise. The Stepwise mode breaks tasks into three editable phases: defining input and output assumptions, creating an execution plan and finally writing the code. Meanwhile, Phasewise, splits problems into subgoals with paired assumptions and code blocks. These assumptions and code blocks are then individually editable. In contrast to ChainForge, these methods work well with structured workflows [4].\"}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":\"Other tools address specific evaluation aspects. ChatEval uses LLMs to evaluate other LLMs' output. Essentially models are grading the output of other models. EvalLM enables interactive prompt testing with user-defined criteria allowing users to compare generated outputs.\"}],\"\\n\",[\"$\",\"h2\",\"h2-3\",{\"children\":\"Use Cases\"}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":\"While ChainForge was designed for systematic prompt testing [2], users have discovered creative applications that extend beyond its original purpose. One interesting example is StarCharm, an LLM-powered mod creator for the farming game Stardew Valley. Traditionally modders write character dialogue, schedules and behaviours manually, which is a time-consuming process. StarCharm makes this process more accessible by letting players describe their desired character in natural language and then the system automatically creates a complete playable NPC mod [5].\"}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":[[\"$\",\"img\",\"img-0\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/image-1.png\",\"alt\":\"alt text\",\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 2:  System architecture of the StarCharM tool\"}]]}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":\"StarCharm uses ChainForge's template system as its generation engine. The template contains variables for character traits, relationship dynamics and daily schedules. Players can describe their characters, which StarCharm uses to fill their templates. These are then sent to an LLM, afterwards the outputs are transformed into configuration files compatible with Stardew Valley's Content Patcher modding tool [5]. In other words, the same template could be used to generate a mysterious wizard or a funny merchant.\"}],\"\\n\",[\"$\",\"h2\",\"h2-4\",{\"children\":\"Future\"}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":\"ChainForge and similar tools highlight the need for end-user LLMOps solutions. Tools that help users evaluate and customize AI systems without coding or machine learning knowledge. In the future, prompt engineering may move away from being a traditional programming task towards one where users express their intentions using plain language. This approach aligns with \\\"vibe coding\\\", where users express what they want without needing to know how to code.\"}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":\"Another possibility is that prompt engineering might disappear as LLMs get better. They might optimize themselves autonomously. Similar to ChatEval, future LLMs could first evaluate their own prompts and then improve them to guarantee optimal responses.\"}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":\"Overall, we will likely see a mixture of both approaches. Prompt engineering will become easier while LLM will become better at optimizing prompts. However, I think for some high-stakes fields such as healthcare, human evaluation will remain the standard. This is in part because of the serious consequences and because people demand transparency and control before trusting AI with critical health decisions.\"}],\"\\n\",[\"$\",\"p\",\"p-17\",{\"children\":[\"$\",\"strong\",\"strong-0\",{\"children\":\"References:\"}]}],\"\\n\",[\"$\",\"p\",\"p-18\",{\"children\":[\"[1] OpenAI. (2025, September 15). How people are using ChatGPT. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://openai.com/de-DE/index/how-people-are-using-chatgpt/\",\"children\":\"https://openai.com/de-DE/index/how-people-are-using-chatgpt/\"}]]}],\"\\n\",[\"$\",\"p\",\"p-19\",{\"children\":\"[2] Arawjo, I., Swoopes, C., Vaithilingam, P., Wattenberg, M., \u0026 Glassman, E. L. (2024). ChainForge: A visual toolkit for prompt engineering and LLM hypothesis testing. Proceedings of the CHI Conference on Human Factors in Computing Systems, 1-18\"}],\"\\n\",[\"$\",\"p\",\"p-20\",{\"children\":\"[3] Mishra, A., Danzy, B., Soni, U., Arunkumar, A., Huang, J., Kwon, B. C., \u0026 Bryan, C. (2025). PromptAid: Visual prompt exploration, perturbation, testing and iteration for large language models. IEEE Transactions on Visualization and Computer Graphics, 31(10), 6946-6962.\"}],\"\\n\",[\"$\",\"p\",\"p-21\",{\"children\":\"[4] Kazemitabaar, M., Williams, J., Drosos, I., Grossman, T., Henley, A. Z., Negreanu, C., \u0026 Sarkar, A. (2024). Improving steering and verification in AI-assisted data analysis with interactive task decomposition. Proceedings of the 37th Annual ACM Symposium on User Interface Software and Technology, 1-19.\"}],\"\\n\",[\"$\",\"p\",\"p-22\",{\"children\":\"[5] Zand Miralvand, H., Ronagh Nikghalb, M., Darandeh, M., Khan, A., Arawjo, I., \u0026 Cheng, J. (2025).\\nDemocratizing game modding with GenAI: A case study of StarCharM, a Stardew Valley character maker. Proceedings of the ACM on Human-Computer Interaction, 9(6), Article GAMES017\"}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L11\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Leroy Borgeaud dit Avocat\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
