me\":\"blog-nav-week\",\"children\":\"W8\"}],\"Real-time Collaborative Editing\"]}]}],[\"$\",\"li\",\"programming-interactive-articles\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/programming-interactive-articles/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Interactive Articles\"]}]}],[\"$\",\"li\",\"programming-scenes\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/programming-scenes/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Scenes\"]}]}],[\"$\",\"li\",\"developer-community\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/developer-community/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W10\"}],\"Developer Community\"]}]}],[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/code-clustering/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Clustering\"]}]}],[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/code-tutorials/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Tutorials\"]}]}],[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/no-code-environment/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"h2\",\"h2-0\",{\"children\":\"CoPrompt — The Next Step in (Collaborative) Programming?\"}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"Setting the Stage\"}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"In programming, be it for work or leisure, sooner or later collaborative projects will appear. Likewise, sooner or later any programmer may end up being ever so slightly out of their depth (or tired of boilerplate or of Stack Overflow not being particularly helpful). LLMs have changed, for better or worse, how we interact with code, so much so that sharing specialized prompting techniques is becoming as commonplace as sharing odd quirks about C or hacked-together solutions to surprisingly common problems.\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"A handful of issues occur in general when doing collaborative programming, or in an environment where programming, code sharing, LLM prompting, and more are integrated into one. Four of these issues were identified and outlined in the very paper that presents CoPrompt, by Feng et al. (2024). These issues mirror challenges documented in prior work on collaborative notebooks such as Jupyter, notably by Wang et al. (2019), who studied how data scientists use computational notebooks for real-time collaboration, and by Quaranta et al. (2022), who discussed best practices for notebook-based collaborative workflows.\"}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":\"The Ignoble Quartet\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"There are four main issues, which as outlined in Feng et al.'s (2024) CoPrompt paper are:\"}],\"\\n\",[\"$\",\"ol\",\"ol-0\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Awareness\"}],\": Especially as the project grows, it becomes increasingly difficult to keep everything in mind. This refers to subroutines in code, class structure, and notably also prompts.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Synchronization\"}],\": Everyone has at some point struggled with Git versioning or, worse yet, been forced to update code by hand. A tall order, and one dangerously prone to errors at that. This equally applies to prompts: for example, if one prompt changes, then all prompts following it in the same context may end up breaking due to malformed context. Feng et al. (2024) refer to these as \\\"procedural dependencies\\\". Incidentally, this is a term borrowed from work on multiverse analysis by Liu et al. (2021), who studied how changes in one part of a data pipeline cascade through dependent steps.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Feedback and Assistance\"}],\": Sometimes you're stuck, can't find anything on the Internet and even your LLM of choice isn't particularly helpful: so you take to pinging your collaborator on Slack on a quarter-hourly basis. Of course, getting frequent (or even one-off, sometimes) pings can rupture your workflow.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Reference\"}],\": Frequently alterations and fixes have to be copy-pasted, and either these lag behind some of the dependencies in your code or themselves need to still be tailored to fit the rest of the project's structure. This is closely related to the \\\"abstraction matching problem\\\" as mentioned by Liu et al. (2023), where in their study on end-user programmers working with code-generating LLMs the difficulty of figuring out what phrasing the AI will actually understand and produce useful code from is discussed. In essence, it is the reason as to why some people refer to it as prompt \",[\"$\",\"em\",\"em-0\",{\"children\":\"engineering\"}],\".\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"h3\",\"h3-2\",{\"children\":\"CoPrompt - The Fix?\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"But what if prompting, sharing, and editing didn't require ChatGPT and Slack and VSCode open all at the same time, but could rather be integrated into one tool? What if all those core issues could be addressed, merely with good design principles? Enter CoPrompt.\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"CoPrompt is a novel editor (the introductory paper having been released in May of 2024) which aims to integrate code editor, chat platform, and code-specific LLM open for prompting all into one (Feng et al., 2024).\"}],\"\\n\",[\"$\",\"h6\",\"h6-0\",{\"children\":\"Design Principles\"}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"The four core pillars at the center of CoPrompt's design (as described in Feng et al. (2024)) are:\"}],\"\\n\",[\"$\",\"ol\",\"ol-1\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Share\"}],\": You can simply select whatever it is you need to share: code, data, some intermediary result. You choose to whom it is you want to share, and everything on their end gets updated with the additional context.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Link\"}],\": It's common for variable names (among other things) to be changed and updated. Editors like IntelliJ offer the ability to refactor the code on your end directly across all dependencies; the CoPrompt editor does so on everyone's end.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Refer\"}],\": Instead of needing to dig through code and construct your own context for a given prompt, you can simply refer to a relevant prompt that already pre-establishes the necessary context (assuming, of course, that it already is available).\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Request\"}],\": Whenever you get stuck on a dependency such as a sub-routine not being implemented which wasn't your responsibility to implement, you may find yourself blocked. This allows you to call for help from your collaborator, to move on to another subtask you can do without any dependency, and upon completion of said sub-routine, CoPrompt updates prompt and code to keep everything running smoothly, with as little busy waiting as possible. Interestingly, this is partially touched upon by Wu et al. (2022) in their work on AI Chains, wherein complex tasks are broken into manageable, chainable subtasks for more transparent human-AI interaction.\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"h6\",\"h6-1\",{\"children\":\"Results and Data\"}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"It also seems as though CoPrompt has promising results, at least according to their own study when comparing the omni-integrated IDE to simply using VSCode with Live Share and CoPilot (from here on referred to as the baseline configuration).\"}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"Given a handful of tasks in a user study, it was found that when using CoPrompt (Feng et al., 2024):\"}],\"\\n\",[\"$\",\"ul\",\"ul-0\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":\"Users finish on average three and a half minutes earlier compared to when using the baseline configuration.\"}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":\"Users also seem to require fewer edits, both for code and for prompts, needing 59% and 33% fewer edits respectively, when compared to the baseline.\"}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":\"Evaluating CoPrompt versus the baseline on the System Usability Scale (SUS) yielded a score of 90.6 as opposed to 68.9, indicating a 20 point advantage for CoPrompt.\"}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":\"On a more \\\"human\\\" level, users reported that they felt significantly less frustration when using CoPrompt as opposed to when using the baseline config.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":\"Overall, this all seems promising for (intelligently) integrated IDE-LLM-Messaging apps.\"}],\"\\n\",[\"$\",\"h3\",\"h3-3\",{\"children\":\"My Own Two Cents\"}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"Of course, CoPrompt is still more prototype than finished product. In fact, I was quite interested in trying it out. Alas, as of December 2025, there was no way to actually test it for myself.\"}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":\"Still, it makes me think: all these results and core pillars seem to be promising, but would reception by the general (read: programming) public really be as positive as the study results suggest?\"}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":\"So far, when using IDEs with LLM integration or ML-model based code prediction/completion, I found myself rather disappointed if not outright frustrated with the result, at least when the complexity of the project superseded mere tutorial-level problems. In particular, VSCode with CoPilot seemed to suggest code that either had me running in circles or not progress at all. IntelliJ's IntelliSense was no less frustrating, as most of the suggestions for variable names at best didn't entirely fit my naming convention preferences, and at worst code snippets seemed to be based on pattern matching more than actually solving anything.\"}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":\"What does inspire some (cautious) confidence in CoPrompt is that it boasts features like a prompt wiki and native communication options with collaborators. I do feel suspicious about its context-aware cascading update features, but then again, many IDEs are capable of natively but manually refactoring code without any issues. The key takeaway is that CoPrompt is a new evolution of a tool, and tools typically require a certain skill floor to wield properly, especially if they're powerful.\"}],\"\\n\",[\"$\",\"h3\",\"h3-4\",{\"children\":\"Further Reading and References\"}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":[\"Feng, L., Yen, R., You, Y., Fan, M., Zhao, J., \u0026 Lu, Z. (2024). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3613904.3642212\",\"children\":\"CoPrompt: Supporting Prompt Sharing and Referring in Collaborative Natural Language Programming\"}],\".\"]}],\"\\n\",[\"$\",\"h3\",\"h3-5\",{\"children\":\"About the Author\"}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":\"Hi, my name is Mark Sosman. I'm a computer science student with an immense passion for programming, math, and teaching.\"}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":[\"Liu, M. X., Sarkar, A., Negreanu, C., Zorn, B., Williams, J., Toronto, N., \u0026 Gordon, A. D. (2023). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3544548.3580817\",\"children\":\"\\\"What It Wants Me To Say\\\": Bridging the Abstraction Gap Between End-User Programmers and Code-Generating Large Language Models\"}],\".\"]}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":[\"Liu, Y., Kale, A., Althoff, T., \u0026 Heer, J. (2021). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://ieeexplore.ieee.org/document/9216579\",\"children\":\"Boba: Authoring and Visualizing Multiverse Analyses\"}],\".\"]}],\"\\n\",[\"$\",\"p\",\"p-17\",{\"children\":[\"Quaranta, L., Calefato, F., \u0026 Lanubile, F. (2022). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3512934\",\"children\":\"Eliciting Best Practices for Collaboration with Computational Notebooks\"}],\".\"]}],\"\\n\",[\"$\",\"p\",\"p-18\",{\"children\":[\"Wang, A. Y., Mittal, A., Brooks, C., \u0026 Oney, S. (2019). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3359141\",\"children\":\"How Data Scientists Use Computational Notebooks for Real-Time Collaboration\"}],\".\"]}],\"\\n\",[\"$\",\"p\",\"p-19\",{\"children\":[\"Wu, T., Terry, M., \u0026 Cai, C. J. (2022). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3491102.3517582\",\"children\":\"AI Chains: Transparent and Controllable Human-AI Interaction by Chaining Large Language Model Prompts\"}],\".\"]}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L11\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Mark Sosman\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
