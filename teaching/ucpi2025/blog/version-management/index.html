me\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Interactive Articles\"]}]}],[\"$\",\"li\",\"programming-scenes\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/programming-scenes\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Scenes\"]}]}],[\"$\",\"li\",\"developer-community\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/developer-community\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W10\"}],\"Developer Community\"]}]}],[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-clustering\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Clustering\"]}]}],[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-tutorials\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Tutorials\"]}]}],[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/no-code-environment\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/accessibility\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"h1\",\"h1-0\",{\"children\":\"Why Can't Data Scientists Remember What They Tried?\"}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"$\",\"em\",\"em-0\",{\"children\":\"Hunting for answers in 300 versions of a Jupyter notebook\"}]}],\"\\n\",[\"$\",\"hr\",\"hr-0\",{}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"Imagine you've spent the afternoon building a machine learning model to predict house prices. You've tried dozens of features, tweaked hyperparameters, and finally landed on something that works. Then your manager asks the simple question \\\"Why did you discard the garage size feature?\\\"\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"You know you tested it and you remember the results weren't great. But where? When? The evidence is buried somewhere in your history of experiments, and finding it feels impossible.\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":[\"This scenario happens all the time in data science. In one study, a researcher working on a beginner machine learning tutorial generated \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"302 versions\"}],\" of their code in just one hour (Kery et al., 2019). That's five versions per minute, which pushes traditional version control to its limits.\"]}],\"\\n\",[\"$\",\"h2\",\"h2-0\",{\"children\":\"Exploratory Programming is Messy\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"Data science is less straight forward than building a web app for example. It's exploratory, iterative, and full of dead ends. You try something, check the output, tweak a parameter, try again. Traditional version control tools like Git were designed for software engineers who make deliberate commits with meaningful messages. Not for data scientists who are experimenting.\"}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":[\"Studies show that \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"only 3 out of 10 data scientists use Git\"}],\" (Kery et al., 2017). Instead they copy scripts or comment out alternatives. One participant said \\\"It's just a lot of stuff and stuff and stuff\\\" (Kery et al., 2018).\"]}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"Here is what using Git with notebooks usually looks like:\"}],\"\\n\",[\"$\",\"pre\",\"pre-0\",{\"children\":[\"$\",\"code\",\"code-0\",{\"className\":\"language-diff\",\"children\":\"diff --git a/analysis.ipynb b/analysis.ipynb\\nindex 8f3d4e2..9a2b5f3 100644\\n@@ -15,7 +15,7 @@\\n | metadata: {},\\n | outputs: [],\\n | source: [\\n-    x = 5\\\\n,\\n+    x = 10\\\\n,\\n |  y = x * 2\\\\n,\\n |  print(y)\\n@@ -45,12 +45,12 @@\\n | name: stdout,\\n | output_type: stream,\\n | text: [\\n-    \\\"10\\\\n\\\"\\n+    \\\"20\\\\n\\\"\\n@@ -89,7 +89,7 @@\\n | nbconvert_exporter: python,\\n | pygments_lexer: ipython3,\\n-  version: \\\"3.8.5\\\"\\n+  version: \\\"3.8.8\\\"\\n |widgets: {\\n | application/vnd.jupyter.widget-state+json: {\\n-    version_major: 2,\\n-    version_minor: 0\\n+    version_major: 3,\\n+    version_minor: 1\\n\"}]}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"Good luck finding what actually changed in your analysis.\"}],\"\\n\",[\"$\",\"h2\",\"h2-1\",{\"children\":\"Hunting for Information\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":[\"To solve this problem, researchers explored \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Information Foraging Theory (IFT)\"}],\". Developed by Pirolli and Card (1999) it applies principles from how animals hunt for food to how humans search for information.\"]}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"Programmers are \\\"predators\\\" hunting for \\\"prey\\\" (the information they need) across \\\"patches\\\" (parts of the interface). Just as animals follow scent trails to food, programmers follow cues like dates, previews, and diff highlighting to find what they're looking for.\"}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":\"If foraging becomes too costly (too much scrolling, too many clicks, too little payoff) people give up. They will either redo the experiment or simply guess the outcome. Neither is acceptable.\"}],\"\\n\",[\"$\",\"h2\",\"h2-2\",{\"children\":\"Verdant: A New Approach to Notebook History\"}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":[\"Armed with these insights, researchers at Carnegie Mellon developed \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Verdant\"}],\", a JupyterLab extension that rethinks how data scientists interact with their history (Kery et al., 2019).\"]}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":[\"At its core is \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"lilGit\"}],\", which is a versioning model that breaks notebooks into a hierarchy of artifacts:\"]}],\"\\n\",[\"$\",\"pre\",\"pre-1\",{\"children\":[\"$\",\"code\",\"code-0\",{\"className\":\"language-mermaid\",\"children\":\"graph TD\\n    A[Notebook] --\u003e B[Markdown Cell]\\n    A --\u003e C[Code Cell]\\n    A --\u003e D[Output]\\n    C --\u003e E[Code Snippet\u003cbr/\u003ee.g., function call]\\n    C --\u003e F[Code Snippet\u003cbr/\u003ee.g., assignment]\\n    E --\u003e G[Parameter Values]\\n    style A fill:#e1f5fe\\n    style C fill:#fff3e0\\n    style D fill:#f3e5f5\\n\"}]}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":\"Unlike Git, which tracks files, lilGit tracks artifacts. Individual code snippets, their outputs and AST-level changes. Each artifact maintains its own history, so you can ask \\\"what were all the values this parameter ever had?\\\" without wading through hundreds of commits.\"}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":[\"Verdant captures checkpoints automatically whenever you run, save, add, or delete a cell. No manual commits required. The history is stored in a simple \",[\"$\",\"code\",\"code-0\",{\"children\":\".ipyhistory\"}],\" file.\"]}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":\"However the real innovation is in how Verdant helps you find things. It offers 3 foraging strategies:\"}],\"\\n\",[\"$\",\"pre\",\"pre-2\",{\"children\":[\"$\",\"code\",\"code-0\",{\"className\":\"language-mermaid\",\"children\":\"flowchart LR\\n    Q[Your Question] --\u003e S{What do you\u003cbr/\u003eremember?}\\n    S --\u003e|When it happened| A[Activity Tab\u003cbr/\u003eTimeline + minimap]\\n    S --\u003e|Which artifact| B[Artifacts Tab\u003cbr/\u003eInspector tool]\\n    S --\u003e|A keyword| C[Search Tab\u003cbr/\u003eFilters by type]\\n    A --\u003e G[Ghost Book]\\n    B --\u003e G\\n    C --\u003e G\\n\"}]}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"The 3 Foraging Strategies\"}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":[\"The \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Activity tab\"}],\" shows history by time. Each version displays a minimap showing where in the notebook changes occured, leveraging spatial memory. The minimap uses different colors. Blue for edits, green for additions, red for deletions, and grey for cells that were run without changes.\"]}],\"\\n\",[\"$\",\"img\",\"img-0\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w8-version-management-img/fig3-activity-tab.png\",\"alt\":\"Notebook events.\",\"height\":300,\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-17\",{\"children\":[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 2: The Activity tab with timeline and minimap visualization. Each vertical line in the minimap represents a cell; colored lines indicate activity.\"}]}],\"\\n\",[\"$\",\"p\",\"p-18\",{\"children\":[\"The \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Artifacts tab\"}],\" works like a browser's HTML inspector: click any cell, snippet, or output to see its complete version history accross the entire project. The table of contents view shows each artifact with its version count, which makes it easy to find sections that have been edited a lot.\"]}],\"\\n\",[\"$\",\"img\",\"img-1\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w8-version-management-img/fig6-artifacts-detail.png\",\"alt\":\"Summary table listing each cell in the notebook with the number of versions.\",\"height\":300,\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-19\",{\"children\":[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 3: The Artifacts tab showing a table of contents. The number on the right indicates how many versions each artifact has.\"}]}],\"\\n\",[\"$\",\"p\",\"p-20\",{\"children\":[\"The \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Search tab\"}],\" handles keyword queries with filters for artifact types and dates. This is a good way to for example \\\"find all tables that included a column named Garage.\\\" Results are grouped by artifact type, code, markdown, output, to reduce scrolling.\"]}],\"\\n\",[\"$\",\"img\",\"img-2\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w8-version-management-img/fig7-search-tab.png\",\"alt\":\"Results for the query garage.\",\"height\":300,\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-21\",{\"children\":[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 4: Searching for \\\"garage\\\" returns categorized results.\"}]}],\"\\n\",[\"$\",\"p\",\"p-22\",{\"children\":[\"In order to get the full context Verdant opens a \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Ghost Book\"}],\". This is a read-only view of any past notebook version displayed side-by-side with your current work. Diff highlighting shows what changed in green (additions) and red (deletions).\"]}],\"\\n\",[\"$\",\"img\",\"img-3\",{\"src\":\"/peachlab.inf.ethz.ch/assets/teaching/ucpi2025-blogs/w8-version-management-img/fig8-ghost-book.png\",\"alt\":\"A ghost book showing version #104 of the notebook.\",\"width\":\"100%\",\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-23\",{\"children\":[\"$\",\"em\",\"em-0\",{\"children\":\"Figure 5: A ghost book displays a past notebook version with diff highlighting. The toggle lets users show only cells that changed in that version.\"}]}],\"\\n\",[\"$\",\"h2\",\"h2-3\",{\"children\":\"Does It Actually Work?\"}],\"\\n\",[\"$\",\"p\",\"p-24\",{\"children\":\"The researchers tested Verdant with 15 data scientists at JupyterCon 2018. All participants were complete novices to the tool and were asked to answer questions about a 300-version notebook they had never seen before.\"}],\"\\n\",[\"$\",\"p\",\"p-25\",{\"children\":[\"They scored \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"80% median success rate\"}],\" across realistic foraging tasks (Kery et al., 2019). First-time users could successfully navigate someone else's complex history to find specific code, outputs, and relationships.\"]}],\"\\n\",[\"$\",\"p\",\"p-26\",{\"children\":\"The failures were also instructive. Users struggled most with questions requiring them to relate multiple artifacts across time. This led to redesigns that grouped related results and added better navigation cues.\"}],\"\\n\",[\"$\",\"h2\",\"h2-4\",{\"children\":\"Where Do We Go From Here?\"}],\"\\n\",[\"$\",\"p\",\"p-27\",{\"children\":[\"Verdant was just the beginning. Recent work like \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"Kishuboard\"}],\" (Fang et al., 2025) extends these ideas to track not just code history but also data state, letting users branch their exploration without losing progress or reloading datasets.\"]}],\"\\n\",[\"$\",\"p\",\"p-28\",{\"children\":\"In the future notebooks could automaticaly generate narratives explaining why changes happened, not just what changed. Also, AI could help synthesize patterns from hundreds of experiments into useful insights.\"}],\"\\n\",[\"$\",\"p\",\"p-29\",{\"children\":\"With data science evolving faster than ever, the tools must also evolve beyond \\\"save early, save often\\\" toward genuine support for the exploratory, iterative work that data scientists actually do. The goal isn't just to remember what you tried, it's to understand why you made the choices you did.\"}],\"\\n\",[\"$\",\"hr\",\"hr-1\",{}],\"\\n\",[\"$\",\"h2\",\"h2-5\",{\"children\":\"References\"}],\"\\n\",[\"$\",\"p\",\"p-30\",{\"children\":[\"Fang, H., Chockchowwat, S., Sundaram, H., \u0026 Park, Y. (2025). Enhancing computational notebooks with code+data space versioning. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 2025 CHI Conference on Human Factors in Computing Systems\"}],\". ACM.\"]}],\"\\n\",[\"$\",\"p\",\"p-31\",{\"children\":[\"Kery, M. B., Horvath, A., \u0026 Myers, B. A. (2017). Variolite: Supporting exploratory programming by data scientists. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 2017 CHI Conference on Human Factors in Computing Systems\"}],\", 1265–1276. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3025453.3025626\",\"children\":\"https://doi.org/10.1145/3025453.3025626\"}]]}],\"\\n\",[\"$\",\"p\",\"p-32\",{\"children\":[\"Kery, M. B., John, B. E., O'Flaherty, P., Horvath, A., \u0026 Myers, B. A. (2019). Towards effective foraging by data scientists to find past analysis choices. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 2019 CHI Conference on Human Factors in Computing Systems\"}],\", 1–13. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3290605.3300322\",\"children\":\"https://doi.org/10.1145/3290605.3300322\"}]]}],\"\\n\",[\"$\",\"p\",\"p-33\",{\"children\":[\"Kery, M. B., Radensky, M., Arya, M., John, B. E., \u0026 Myers, B. A. (2018). The story in the notebook: Exploratory data science using a literate programming tool. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 2018 CHI Conference on Human Factors in Computing Systems\"}],\", 1–11. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3173574.3173748\",\"children\":\"https://doi.org/10.1145/3173574.3173748\"}]]}],\"\\n\",[\"$\",\"p\",\"p-34\",{\"children\":[\"Pirolli, P., \u0026 Card, S. (1999). Information foraging. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Psychological Review, 106\"}],\"(4), 643–675.\"]}],\"\\n\",[\"$\",\"hr\",\"hr-2\",{}],\"\\n\",[\"$\",\"p\",\"p-35\",{\"children\":\"I am a Master's student in Computer Science. Aside from playing volleyball and chess, I like to build web apps for friends and familiy and explore simple and user driven UX.\"}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L11\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Veit Billinger\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
