enchmark for automated generation of pedagogically meaningful visuals and offers insights into key challenges in producing multimodal educational content, such as the misrepresentation of mathematical relationships and the omission of essential visual elements.14:T4a1,Visuals are valuable tools for teaching math word problems ( MWPs), helping young learners interpret textual descriptions into mathematical expressions before solving them. However, creating such visuals is labor-intensive and there is a lack of automated methods to support this process. In this paper, we present MATH2VISUAL, an automatic framework for generating pedagogically meaning"])</script><script>self.__next_f.push([1,"ful visuals from MWP text descriptions. MATH2VISUAL leverages a pre-defined visual language and a design space grounded in interviews with math teachers, to illustrate the core mathematical relationships in MWPs. Using MATH2VISUAL, we construct an annotated dataset of 1,903 visuals and evaluate Text-to-Image (TTI ) models for their ability to generate visuals that align with our design. We further fine-tune several TTI models with our dataset, demonstrating improvements in educational visual generation. Our work establishes a new benchmark for automated generation of pedagogically meaningful visuals and offers insights into key challenges in producing multimodal educational content, such as the misrepresentation of mathematical relationships and the omission of essential visual elements."])</script><script>self.__next_f.push([1,"8:[\"$\",\"div\",null,{\"className\":\"mx-auto max-w-3xl px-5 py-8\",\"children\":[\"$\",\"div\",null,{\"style\":{\"maxWidth\":\"800px\",\"margin\":\"0 auto\",\"padding\":\"40px 20px\"},\"children\":[[\"$\",\"h2\",null,{\"style\":{\"fontSize\":\"1.75rem\",\"fontWeight\":700},\"children\":\"Generating Pedagogically Meaningful Visuals for Math Word Problems: A New Benchmark and Analysis of Text-to-Image Models\"}],[\"$\",\"p\",null,{\"children\":[[\"$\",\"st
