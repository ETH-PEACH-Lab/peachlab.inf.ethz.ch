ic/chunks/820-3d99e0129c665b55.js\",\"922\",\"static/chunks/922-34389554f0960585.js\",\"419\",\"static/chunks/app/projects/%5Bslug%5D/page-caf176fbe6609d2d.js\"],\"default\"]\n12:T488,Monitoring in-class programming exercises can help instructors identify struggling students and common challenges. However, understanding students’ progress can be prohibitively difficult, particularly for multi-faceted problems that include multiple steps with complex interdependencies, have no predictable completion order, or involve evaluation criteria that are difficult to summarize across many students (e.g., exercises building interactive web-based user interfaces). We introduce SPARK, a coding exercise monitoring dashboard designed to address these challenges. SPARK allows instructors to flexibly group substeps into checkpoints based on exercise requirements, suggests automated tests for these checkpoints, and generates visualizations to track progress across steps. SPARK also allows instructors to inspect intermediate outputs, providing deeper insights into solution variations. We also construct a dataset of 40-minute keystroke coding data from N=22 learners solving two web programming exercises and provide empirical insights into the perceived usefulness of SPARK through a within-subjects evaluation with 16 programming instructors.8:[\"$\",\"$L11\",null,{\"pub\":{\"venue\":\"VL/HCC 2025\",\"id\":\"vlhcc2025\",\"slug\":\"spark\",\"year\":\"2025\",\"title\":\"SPARK: Real-Time Monitoring of Multi-Faceted Programming Exercises\",\"authors\":\"Yinuo Yang, Ashley Ge Zhang, Steve Oney, April Yi Wang\",\"venue_full\":\"In Proceedings of the IEEE Symposium on Visual Languages and Human-Centric Computing (VL/HCC 2025)\",\"short_abstract\":\"SPARK enables instructors to monitor students' progress in multi-faceted, non-linear programming exercises in real-time. It provides an easy way for instructors to customize criterias for monitoring progress and identifying potential misunderstanding
