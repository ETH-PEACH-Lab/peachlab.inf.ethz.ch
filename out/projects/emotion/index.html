0 auto\",\"padding\":\"40px 20px\"},\"children\":[[\"$\",\"h2\",null,{\"style\":{\"fontSize\":\"1.75rem\",\"fontWeight\":700},\"children\":\"Emotionally Aware Moderation: The Potential of Emotion Monitoring in Shaping Healthier Social Media Conversations\"}],[\"$\",\"p\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Authors:\"}],\" \",\"Xiaotian Su, Naim Zierau, Soomin Kim, April Yi Wang, Thiemo Wambsganss\"]}],[\"$\",\"p\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Venue:\"}],\" \",\"In Proceedings of the ACM : Human-Computer Interaction, Computer-Supported Cooperative Work and Social Computing (CSCW 2025)\"]}],[\"$\",\"div\",null,{\"style\":{\"textAlign\":\"center\",\"marginTop\":\"24px\"},\"children\":[\"$\",\"$L14\",null,{\"unoptimized\":true,\"width\":800,\"height\":600,\"src\":\"/assets/teaser/cscw2025.png\",\"alt\":\"teaser\",\"style\":{\"maxWidth\":\"100%\",\"height\":\"auto\",\"maxHeight\":\"500px\",\"objectFit\":\"contain\"}}]}],[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none mb-10\",\"children\":[[\"$\",\"p\",\"p-0\",{\"children\":\"We all know the story: online discussions, especially on sensitive topics, can quickly devolve into toxic swamps of hate speech and personal attacks. In response, tech platforms have deployed an army of tools to clean things up, mostly by reactively deleting comments after the damage is done. But a new wave of technology aims to be more proactive. These tools try to help users regulate their own emotions and communicate more constructively before they hit “post.”\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"Our study tested a novel proactive approach: What happens when an emotion monitoring dashboard makes us more aware of the emotions (our peers’ or our own) in our online conversations? The idea was to foster healthier dialogue from the start.\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"The results were mixed but revealing. While hate speech decreased, the increased emotional awareness also triggered unintended spikes in negative emotions such as fear, sadness, and anger.\"}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"Seeing Peer’s Emotions Encouraged Empathy While Polarizing Emotional Tone by Gender\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"In the peer monitoring dashboard, participants were shown a post about abortion and a comment from a fictional user “Eva”. Before writing their own reply, they were shown a dashboard analyzing the emotional content of Eva’s comment, breaking it down into percentages of ‘Angry’, ‘Fear’, ‘Sad’, and ‘Happy’.\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"Nearly three-quarters of participants (71.4%) expressed appreciation for the insight into the peer’s emotions. This awareness prompted them to be more mindful and adjust their own wording.\"}],\"\\n\",[\"$\",\"blockquote\",\"blockquote-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"\\\"\",[\"$\",\"em\",\"em-0\",{\"children\":\"It reminded me to take a step back and frame my response in a way that maybe Eva could actually hear me. It felt like I was given a little insight into how to build a better bridge, rather than burn the whole thing down.\"}],\"\\\" (A19)\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"Moreover, the results revealed a striking gender split. For women, the intervention worked—hate speech in their replies dropped significantly (p \u003c .05). But the shift came with a cost. Their comments contained significantly more words associated with ‘Sad’ and fewer associated with ‘Happy’ compared to a control group (p \u003c .05). Their language also became more personal, using pronouns like “I” and “you” more often — suggesting deeper engagement even as the emotional tone darkened.\"}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":\"Men showed the opposite pattern: their hate speech slightly increased, yet their posts showed fewer negative and more positive emotions.\"}],\"\\n\",\"$L15\",\"\\n\",\"$L16\",\"\\n\",\"$L17\",\"\\n\",\"$L18\",\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\"]}],\"$L1e\"]}]}]\n"])</script><script>self.__next_f.push([1,"1f:I[59860,[\"2951\",\"static/chunks/2951-4ad1c7a7b17e1ac3.js\",\"1356\",\"static/chunks/1356-1fae1da09c7c05e7.js\",\"6873\",\"static/chunks/6873-09bc7bdb05641634.js\",\"8419\",\"static/chunks/app/projects/%5Bslug%5D/page-649d2b06a0097c59.js\"],\"default\"]\n15:[\"$\",\"h3\",\"h3-1\",{\"children\":\"Seeing Our Own Emotions Felt Like Censorship and Considered Inaccurate\"}]\n16:[\"$\",\"blockquote\",\"blockquote-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"\\\"\",[\"$\",\"em\",\"em-0\",{\"children\":\"Rather than feeling like I’m making sure my comments are civil, it really just feels like I’m being censored.\"}],\"\\\" (B13)\"]}],\"\\n\"]}]\n17:[\"$\",\"p\",\"p-7\",{\"children\":\"When the same tool analyzed their own drafts, the idea was appreciated, but participants reported finding the analysis inaccurate, leading them to feel judged or censored. For self monitoring, we provided participants with an emotional analysis of their own draft comment before posting. Over half (58.3%) appreciated the concept of emotion monitoring. However, many users found the tool’s analysis inaccurate and frustrating, feeling it was unfairly judging or censoring them. This sentiment was sharp and clear.\"}]\n18:[\"$\",\"blockquote\",\"blockquote-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"\\\"\",[\"$\",\"em\",\"em-0\",{\"children\":\"It’s extremely hectoring and judgmental. I don’t need my sentiment to be analyzed since obviously I know how I feel (and better than an algorithm).\"}],\"\\\" (B32)\"]}],\"\\n\"]}]\n19:[\"$\",\"p\",\"p-8\",{\"children\":\"A key reason for this inaccuracy was the algorithm’s lack of contextual understanding. The source explains, “The text2emotion package works by detecting emotion-related words and categorizing them… When participants discuss negative topics, the algorithm reports negative emotions even if the participants do not intend to express such emotions.” A participant (B17) perfectly illustrated this flaw, noting that using the word “rape” in a factual comment about abortion access triggered a high “fear” score, misinterpreting a factual argument as an emoti"])</script><script>self.__next_f.push([1,"onal state.\"}]\n1a:[\"$\",\"h3\",\"h3-2\",{\"children\":\"Conclusion: The Complicated Future of Emotionally-Aware Tech\"}]\n1b:[\"$\",\"p\",\"p-9\",{\"children\":\"These findings reveal a fascinating split in human behavior: we welcome insight into others but resist algorithmic judgment of ourselves. More importantly, they show there is no simple technological fix for online toxicity. Tools designed to make us more “civil” can have complex and unexpected side effects, making conversations more emotionally charged even as they become less hateful.\"}]\n1c:[\"$\",\"p\",\"p-10\",{\"children\":\"The path to healthier online spaces may not be about eliminating negativity but about creating tools that help us express difficult emotions more authentically and constructively, steering us away from abuse without forcing us into artificial positivity. As previous research noted, “heightened awareness reduces the inclination to suppress genuine feelings, leading to more pronounced negative emotions.”\"}]\n1d:[\"$\",\"p\",\"p-11\",{\"children\":\"As we build more AI to understand and shape our conversations, are we prepared for the messy, complicated, and authentic emotions they might reveal in us?\"}]\n"])</script><script>self.__next_f.push([1,"1e:[\"$\",\"$L1f\",null,{\"pub\":{\"venue\":\"CSCW 2025\",\"id\":\"CSCW2025\",\"slug\":\"emotion\",\"year\":\"2025\",\"title\":\"Emotionally Aware Moderation: The Potential of Emotion Monitoring in Shaping Healthier Social Media Conversations\",\"authors\":\"Xiaotian Su, Naim Zierau, Soomin Kim, April Yi Wang, Thiemo Wambsganss\",\"venue_full\":\"In Proceedings of the ACM : Human-Computer Interaction, Computer-Supported Cooperative Work and Social Computing (CSCW 2025)\",\"links\":\"\u003ca\u003eTo Appear\u003c/a\u003e\",\"abstract\":\"Proactive moderation on social media platforms can face criticism for fostering censorship and ignoring the root causes of incivility. We propose and evaluate emotion monitoring mechanisms that enhance users' emotional awareness and mitigate hate speech.\",\"teaser\":\"/assets/teaser/cscw2025.png\",\"preprint_link\":\"https://arxiv.org/abs/2507.21089\",\"is_journal\":true,\"is_featured\":true}}]\n"])</script><script>self.__next_f.push([1,"f:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nb:null\n"])</script><script>self.__next_f.push([1,"d:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"12:\"$d:metadata\"\n"])</script></body></html>
