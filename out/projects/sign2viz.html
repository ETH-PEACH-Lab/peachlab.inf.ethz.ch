\",\"static/chunks/820-3d99e0129c665b55.js\",\"922\",\"static/chunks/922-34389554f0960585.js\",\"419\",\"static/chunks/app/projects/%5Bslug%5D/page-caf176fbe6609d2d.js\"],\"default\"]\n12:T4b2,Data visualizations, such as charts and histograms, are essential for analyzing and exploring data, enabling the effective communication of insights. While existing methods have been proposed to translate natural-language descriptions into visualization queries, they focus solely on spoken languages, overlooking sign languages, which comprise about 200 variants used by 70 million Deaf and Hard-of-Hearing (DHH) individuals. To fill this gap, this paper proposes Sign2Viz, a sign-language interface for data visualization, aimed at empowering the DHH community to engage with data analysis. We first construct a paired dataset that includes sign-language pose videos, paired with their corresponding visualization queries. Subsequently, we evaluate a variety of models, including both pipeline-based and end-to-end approaches, using the newly created dataset. Extensive experiments, coupled with a user study involving 15 participants, demonstrate the effectiveness of our proposed Sign2Viz. Finally, we share key insights from our evaluation and call for the development of more user-friendly techniques and tools to support the DHH community in conducting more effective interactive data analytics.8:[\"$\",\"$L11\",null,{\"pub\":{\"venue\":\"ACL 2025 Findings\",\"id\":\"ACL2025a\",\"slug\":\"sign2viz\",\"year\":\"2025\",\"title\":\"Sign2Vis: Automated Data Visualization from Sign Language\",\"authors\":\"Yao Wan, Yang Wu, Zhen Li, Guobiao Zhang, Hongyu Zhang, Zhou Zhao, Hai Jin, April Wang\",\"venue_full\":\"Findings of the Association for Computational Linguistics: ACL 2025 (ACL '25 Findings)\",\"short_abstract\":\"Sign languages are the primary means of communication for over 70 million Deaf and Hard-of-Hearing individuals, yet are completely unsupported in today’s data visualization tools. We introduce Sign2Vis, the first sign-language interface for generating data vi"])</script><script>self.__next_f.push([1,"sualizations, enabling DHH users to interact with data using natural signing gestures.\",\"teaser\":\"/assets/teaser/acl25a.png\",\"abstract\":\"$12\",\"paper_link\":\"https://aclanthology.org/2025.findings-acl.918/\",\"is_journal\":false,\"is_featured\":true}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Experiential Programming Education Research Lab\"}]]\n"])</script></body></html>
