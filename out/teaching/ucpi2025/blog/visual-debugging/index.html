,\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W9\"}],\"Programming Scenes\"]}]}],[\"$\",\"li\",\"developer-community\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/developer-community/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W10\"}],\"Developer Community\"]}]}],[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/code-clustering/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Clustering\"]}]}],[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/code-tutorials/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W11\"}],\"Code Tutorials\"]}]}],[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/no-code-environment/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"No Code Environment\"]}]}],[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/peachlab.inf.ethz.ch/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":[[\"$\",\"span\",null,{\"className\":\"blog-nav-week\",\"children\":\"W12\"}],\"Accessibility\"]}]}]]}]]}],[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"$1\",\"h2-0\",{\"children\":[[\"$\",\"h2\",null,{\"children\":\"Visual Debugging\"}],[\"$\",\"p\",null,{\"className\":\"blog-byline\",\"children\":[\"by \",\"Junzhe Tai\"]}]]}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"$11\"}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"Introduction to visual debugging\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"The importance visual debugging lies in transforming the abstract program state into a graphical representation that conforms to human visual perception, which could help developers to identify \\\"patterns\\\" and \\\"abnormalities\\\" in the program more efficiently[1]. According to cognitive load theory, effective multimedia design can reduce irrelevant cognitive load and allocate more cognitive resources to other tasks [2].\"}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":\"Pain points in debugging with logging\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"There are roughly four pain points in current logging[3]：\"}],\"\\n\",[\"$\",\"ol\",\"ol-0\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Logged Output Lacking a Meaningful Organization.\\nThe lack of a meaningful organi zation in logs creates significant challenges when programmers try to understand logs. For example, When programmers insert logging statements in a loop to track variable changes, they often need to comment or un-comment other log statements in the program, scroll back and forth in the console panel to locate all related messages, or adjust the log output format to make messages of interest more distinctive.This is because programmers find it difficult to find useful information in a large amount of log output.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Data Structures Lacking Informative Visualizations and Interaction.\\nModern browsers do keep arrays or JSON objects in expandable structures, but when these objects become deeply nested, the logs become unreadable. If you want to log the specific properties deep in the data structure, you need to switch back to the source code and write new log statements that can access the property. Interpreting numbers can also be challenging when it comes to position and dimensions. For example, a value like (250, 480) might represent a screen position—but how large is that position on the actual UI?\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Loss of Context due to Frequent View Switching.\\nDebugging often means juggling between the console, the code editor, the webpage, and the DOM inspector. Each switch breaks concentration.This kind of view-switching makes it difficult to connect logs with their source, slowing down debugging and increasing cognitive load.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Trade-offs when Crafting and Interpreting Logs. Because logging is a temporary debugging tool, most developers don’t invest much effort in making logs clean or readable.\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"So our goals in visual debugging are:\"}],\"\\n\",[\"$\",\"ol\",\"ol-1\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Offering Meaningful and Informative Log Structures.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Supporting Interactive and Visual Logging.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Embedding Logs within Contexts.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-3\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"Minimum Effort for the Desired Enhancements.\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"h3\",\"h3-2\",{\"children\":\"Visual debugging tools: Log-it introduction\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":[\"We introduce a tool born to solve the above four pain points: \",[\"$\",\"em\",\"em-0\",{\"children\":\"Log-it\"}],\"[3]. \",[\"$\",\"em\",\"em-1\",{\"children\":\"Log-it\"}],\"'s core abstraction is a stream, which aggregates all log entries generated by the same log() statement at different times. Each stream has three parts: a header, a body, and a menu. The Stream Header can be dragged to relocate the Stream, and its crosshairs can be dragged to attach the Streams to page elements. The Stream Body hosts the log outputs produced by the log() statement. The Stream Menu offers a set of controls for the Stream, you can pause or resume logging at any time, collapse the stream to focus on the latest value, or remove the stream entirely after it has served its purpose. Importantly, these controls operate on individual log statements, not the entire program, providing developers with a tighter feedback loop.\"]}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":[[\"$\",\"em\",\"em-0\",{\"children\":\"Log-it\"}],\" is interactive. When inspecting complex objects, you can highlight specific attributes all at once, and this highlighting is automatically applied to each log entry in the stream. This is synchronized across time if you expand or collapse a portion of the data structure.\"]}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":[[\"$\",\"em\",\"em-0\",{\"children\":\"Log-it\"}],\" also redesigns how logs are represented. For example, a stream of values ​​can be transformed into a simple bar chart, with changes in values ​​translated into changes in shape. You can choose to view only the latest values ​​or view the entire history in a heatmap-like format. These lightweight visualizations allow users to spot patterns at a glance—especially during debugging.\"]}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":[\"Furthermore, \",[\"$\",\"em\",\"em-0\",{\"children\":\"Log-it\"}],\" has context. Each log statement is assigned a color, which is shared across the code editor and visual flow, allowing users to easily associate what's on the screen with its source in the code. The log flow can also be physically attached to page elements, so the log moves along with the UI it describes. When a problem occurs, the log not only tells you where the problem is, but also where the problem originates.\"]}],\"\\n\",[\"$\",\"h3\",\"h3-3\",{\"children\":\"Result\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":[\"Although \",[\"$\",\"em\",\"em-0\",{\"children\":\"Log-it\"}],\" has not stated in user studies how much efficiency did visual debugging improve, many related papers indicate that visual debugging can improve the efficiency of completing tasks by ~ 30% - 200%, and can shorten debugging time by ~ 2 - 8 times [4][5][6][7].\"]}],\"\\n\",[\"$\",\"h3\",\"h3-4\",{\"children\":\"Future Work\"}],\"\\n\",[\"$\",\"p\",\"p-9\",{\"children\":\"In the future, we can combine artificial intelligence to achieve more functions, such as log filtering and automatically highlighting relevant events. Furthermore, user personalization is also a significant way to enhance the user experience. Finally, visual debugging can be extended to new fields such as virtual reality and game design, where the need for visual debugging is even more urgent.\"}],\"\\n\",[\"$\",\"h3\",\"h3-5\",{\"children\":\"References\"}],\"\\n\",[\"$\",\"p\",\"p-10\",{\"children\":\"[1] Shahnabati F, Sabourifard A, Amiri SH, Bosaghzadeh A, Ebrahimpour R. Cognitive load and visual attention assessment using physiological eye tracking measures in multimedia learning. PLoS One. 2025 Dec 1;20(12):e0337195. doi: 10.1371/journal.pone.0337195. PMID: 41325323; PMCID: PMC12668483.\"}],\"\\n\",[\"$\",\"p\",\"p-11\",{\"children\":[\"[2] Imed Bouchrika. (2026, January). 5 Cognitive Theories Backing the Use of Visuals in Educational Content. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://research.com/education/cognitive-theories-backing-the-use-of-visuals-in-educational-content\",\"children\":\"https://research.com/education/cognitive-theories-backing-the-use-of-visuals-in-educational-content\"}]]}],\"\\n\",[\"$\",\"p\",\"p-12\",{\"children\":\"[3] Jiang, P., Sun, F., \u0026 Xia, H. (2023, April). Log-it: Supporting Programming with Interactive, Contextual, Structured, and Visual Logs. In Proceedings of the 2023 CHI Conference on Human Factors in Computing Systems (pp. 1-16).\"}],\"\\n\",[\"$\",\"p\",\"p-13\",{\"children\":[\"[4] Amy J. Ko and Brad A. Myers. 2004. Designing the whyline: a debugging interface for asking questions about program behavior. In Proceedings of the SIGCHI Conference on Human Factors in Computing Systems (CHI '04). Association for Computing Machinery, New York, NY, USA, 151–158. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/985692.985712\",\"children\":\"https://doi.org/10.1145/985692.985712\"}]]}],\"\\n\",[\"$\",\"p\",\"p-14\",{\"children\":\"[5] M. Willembrinck, S. Costiou, A. Etien and S. Ducasse, \\\"Time-Traveling Debugging Queries: Faster Program Exploration,\\\" 2021 IEEE 21st International Conference on Software Quality, Reliability and Security (QRS), Hainan, China, 2021, pp. 642-653, doi: 10.1109/QRS54544.2021.00074.\"}],\"\\n\",[\"$\",\"p\",\"p-15\",{\"children\":[\"[6] Amy J. Ko and Brad A. Myers. 2004. Designing the whyline: a debugging interface for asking questions about program behavior. In Proceedings of the SIGCHI Conference on Human Factors in Computing Systems (CHI '04). Association for Computing Machinery, New York, NY, USA, 151–158. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/985692.985712\",\"children\":\"https://doi.org/10.1145/985692.985712\"}]]}],\"\\n\",[\"$\",\"p\",\"p-16\",{\"children\":\"[7] Ko, Andrew \u0026 Myers, Brad. (2009). Finding Causes of Program Output with the Java Whyline. 1569-1578. 10.1145/1518701.1518942.\"}]]}],[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L12\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Junzhe Tai\"}],\", a student of the UCPI 2025 seminar.\"]}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]]\n"])</script></body></html>
