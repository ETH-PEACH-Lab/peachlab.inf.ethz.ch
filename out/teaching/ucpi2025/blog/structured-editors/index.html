\":\"Developer Community\"}]}]\n15:[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":\"Accessibility\"}]}]\n16:[\"$\",\"li\",\"week-Programming Interface for Learners\",{\"className\":\"blog-nav-week-item\",\"children\":[\"$\",\"div\",null,{\"className\":\"blog-nav-week-label\",\"children\":\"Programming Interface for Learners\"}]}]\n17:[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-clustering/\",\"className\":\"blog-nav-link \",\"children\":\"Code Clustering\"}]}]\n18:[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-tutorials/\",\"className\":\"blog-nav-link \",\"children\":\"Code Tutorials\"}]}]\n19:[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/no-code-environment/\",\"className\":\"blog-nav-link \",\"children\":\"No Code Environment\"}]}]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"$1\",\"h2-0\",{\"children\":[[\"$\",\"h2\",null,{\"children\":\"Structured Editors\"}],[\"$\",\"p\",null,{\"className\":\"blog-byline\",\"children\":[\"by \",\"Julian Kalitzke\"]}]]}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":[\"What \",[\"$\",\"em\",\"em-0\",{\"children\":\"is\"}],\" structured editing?\"]}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":\"If you’ve ever written code, you’ve likely written it as one continuous wall of text. You can move the cursor to a position in the text, and when you type a letter, it will be inserted at that point. You can select a section and delete or copy it, and you can remove any single letter one by one. Once you have something that seems to make sense, you hand the text file to the compiler or interpreter and it will parse and process the code.\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":[\"This has been true since the origins of programming. As early as the 1980s, when modern tools such as syntax-highlighting and code completion weren't a thing, researchers were thinking about whether pure text was really the best way of writing programs. After all, code is \",[\"$\",\"em\",\"em-0\",{\"children\":\"not\"}],\" just text: it is inherently tied to a syntax, which the compiler or runtime understands. Thus, a text string representing syntactically correct code is actually representing a tree.\"]}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"Consider the following piece of code.\"}],\"\\n\",[\"$\",\"pre\",\"pre-0\",{\"children\":[\"$\",\"code\",\"code-0\",{\"className\":\"language-js\",\"children\":\"console.log(x + Math.sin(2*x/Math.PI) + 10.3);\\n\"}]}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"In a simplified JavaScript syntax, this could be parsed into the following syntax tree:\"}],\"\\n\",[\"$\",\"img\",\"img-0\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/st-1.png\",\"alt\":\"syntax-tree-before\",\"height\":400,\"style\":{\"maxWidth\":\"100%\",\"height\":\"400px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"Now suppose we would like to factor out that second addition inside the logged term. Surely, you know how to modify the above code snippet into this one:\"}],\"\\n\",[\"$\",\"pre\",\"pre-1\",{\"children\":[\"$\",\"code\",\"code-0\",{\"className\":\"language-js\",\"children\":\"let y = Math.sin(2*x/Math.PI) + 10.3;\\nconsole.log(x + y); \\n\"}]}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"My fictional syntax tree for this code looks like this:\"}],\"\\n\",[\"$\",\"img\",\"img-1\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/st-2.png\",\"alt\":\"syntax-tree-after\",\"height\":400,\"style\":{\"maxWidth\":\"100%\",\"height\":\"400px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"children\":[\"However, notice that the blue part is actually the same (sub-)tree! So we could have \",[\"$\",\"em\",\"em-0\",{\"children\":\"directly\"}],\" edited the tree by adding some nodes and moving the whole subtree to another place! This is what structured editing, sometimes called projectional editing, aims to offer.\"]}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":\"Block-based programming\"}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"children\":\"The first advances in structured editing started in the 1980s [1]. Researchers wanted to abstract away annoying syntactical details for the programmer and improve error diagnosis (there were no fancy IDEs back then!). The benefit of structure editors, the researchers argued, was that you inherently cannot make syntactical mistakes - the tree is always valid.\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"children\":\"The first structured editors were menu-based, where users had to select from a list of code constructs to be inserted into the code. The perhaps most well-known menu-based editor today and possibly the most famous structured-editor overall is Scratch [2]. It looks like this:\"}],\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\"]}],\"$L3f\"]}]\n"])</script><script>self.__next_f.push([1,"40:I[32782,[\"2951\",\"static/chunks/2951-4ad1c7a7b17e1ac3.js\",\"7650\",\"static/chunks/app/teaching/ucpi2025/blog/%5Bslug%5D/page-af55958027f2bd2a.js\"],\"default\"]\n1b:[\"$\",\"img\",\"img-2\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/scratch.png\",\"alt\":\"Scratch snippet\",\"height\":300,\"style\":{\"maxWidth\":\"100%\",\"height\":\"300px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}]\n1c:[\"$\",\"p\",\"p-9\",{\"children\":\"The syntax tree nodes are split into text fields (for literals) and Lego-like pieces (for constructs) that can be dragged and dropped around and snap together, guiding the user interactively.\"}]\n1d:[\"$\",\"p\",\"p-10\",{\"children\":\"Scratch was developed in 2009 and is a structured editor targeted for education, but this idea actually goes as far back as 1995 [3]. Since Scratch, Google has developed their own block-based editor called Blockly [4], cementing structured editors as the first point of contact with coding for many children.\"}]\n1e:[\"$\",\"h3\",\"h3-2\",{\"children\":\"Text-based structured editing\"}]\n1f:[\"$\",\"p\",\"p-11\",{\"children\":[\"If you have ever worked with Scratch you will have realized that this is quite cumbersome for real-world programming. Research thus quickly turned to designing a \",[\"$\",\"em\",\"em-0\",{\"children\":\"textual\"}],\" tree editor. This introduces many challenges: Where do you place the cursor? Where does it go if you press arrow keys? Where are new characters placed? How is text turned into tree nodes?\"]}]\n20:[\"$\",\"p\",\"p-12\",{\"children\":\"Most editors represent the tree with visual cues around the linearized text representation. This means that the code more or less is aligned like in a traditional text editor. Holes in the tree (incomplete syntax) are highlighted and sometimes the tree structure is visualized explicitly.\"}]\n21:[\"$\",\"p\",\"p-13\",{\"children\":[\"Hazel [5] is an editor that allows programming in a specifically designed functional programming language and, notably, can also \",[\"$\",\"em\",\"em-0\",{\"children\":\"execute\"}],\" partial syntax trees. This was achieved "])</script><script>self.__next_f.push([1,"by defining a complex type-system and -theory based on lambda calculus.\"]}]\n22:[\"$\",\"p\",\"p-14\",{\"children\":[\"But most of the time, programmers already have a programming language they want to program in. In this case, the structured editor must be designed in a way to handle arbitrary syntaxes. These are often called structured editor generators. One very recent example is Sandblocks [6]. Syntax is provided using Tree-sitter, an open-source parser generator. The generated parser is augmented by \",[\"$\",\"em\",\"em-0\",{\"children\":\"partial parsing\"}],\" which also outputs possible ways to complete the tree (fill holes).\"]}]\n23:[\"$\",\"p\",\"p-15\",{\"children\":\"Just like regular code editors, Sandblocks allows opening, editing and saving text files. However, when editing, the editor supports both textual input, as well as moving (and deleting) whole tree nodes. Pretty cool!\"}]\n24:[\"$\",\"img\",\"img-3\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/sb-1.gif\",\"alt\":\"SB-Move\",\"height\":600,\"style\":{\"maxWidth\":\"100%\",\"height\":\"600px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}]\n25:[\"$\",\"p\",\"p-16\",{\"children\":\"The editor features a \\\"block cursor\\\" which, like the text cursor, can be moved with arrow keys and can copy, cut and paste whole blocks (nodes).\"}]\n26:[\"$\",\"p\",\"p-17\",{\"children\":\"When inserting text, the partial parser informs the editor which structures are permitted, and then shows a popup to the user and creates a new node once it is clear which syntax construct is inserted.\"}]\n27:[\"$\",\"img\",\"img-4\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/sb-2.gif\",\"alt\":\"SB\",\"height\":180,\"style\":{\"maxWidth\":\"100%\",\"height\":\"180px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}]\n28:[\"$\",\"p\",\"p-18\",{\"children\":\"Sandblocks is still being developed and a user-study suggests some design decisions (e.g. cursor heuristics) that could be revisited. Nevertheless, it allows a glimpse into how practical text-based structured editors could one day look like.\"}]\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"h3\",\"h3-3\",{\"children\":\"Structured editing in disguise\"}]\n2a:[\"$\",\"p\",\"p-19\",{\"children\":\"Although structured editing hasn't made it out of research except in education and some small niches (like JetBrains' MPS editor [7]), ideas from structured editing have actually sneaked into text-based code editors over time.\"}]\n2b:[\"$\",\"p\",\"p-20\",{\"children\":\"One example any programmer surely knows are small buttons next to the text field that allow collapsing and expanding a block of code, such as a while- or an if-block.\"}]\n2c:[\"$\",\"p\",\"p-21\",{\"children\":\"Another example is the feature present in many IDEs such as JetBrains' IntelliJ IDEA of refactoring out a term into a new variable as shown below. The user selects a code expression (effectively a syntax tree node), presses a shortcut and the editor cuts the code and places it in a new variable assignment template above the current one line. The cursor is moved to the variable name. The user enters characters that are synchronously inserted as the new variable's name and in the original place of the expression.\"}]\n2d:[\"$\",\"img\",\"img-5\",{\"src\":\"/assets/teaching/ucpi-blog-2025/blogs/w5-structured-editors-img/intelliJ-var-replace.gif\",\"alt\":\"IntelliJ-variable\",\"height\":180,\"style\":{\"maxWidth\":\"100%\",\"height\":\"180px\",\"borderRadius\":\"8px\",\"margin\":\"20px auto\",\"display\":\"block\"}}]\n2e:[\"$\",\"p\",\"p-22\",{\"children\":\"This shows how being aware of syntax supercharges a code editor or IDE and makes the programming experience much more efficient.\"}]\n2f:[\"$\",\"h3\",\"h3-4\",{\"children\":\"The future\"}]\n30:[\"$\",\"p\",\"p-23\",{\"children\":[\"Structured editing has yet to make its way into mainstream programming. While it has already strongly influenced plain-text coding editors, programmers could certainly benefit from even more structure-aware coding environments. One could imagine an integrated approach, with a toggle between \\\"text-mode\\\" and \\\"tree-mode\\\", similar to editors like \",[\"$\",\"code\",\"code-0\",{\"children\":\"vim\"}],\".\"]}]\n31:[\"$\",\"p\",\"p-24\",{\"children\":\"At the same time, there "])</script><script>self.__next_f.push([1,"is growing interest in rethinking the necessity of programming entirely, letting language models do the coding. These tools are generally still used by human programmers who alternate between reviewing code and prompting edit changes.\"}]\n32:[\"$\",\"p\",\"p-25\",{\"children\":\"However, it is often tedious to describe in text which part should be edited. Here, structured editing could significantly improve the programmer's efficiency. Structured selection ([6], [8]) would let the programmer define the context of the next prompt at a keystroke, while a visual interface outlining the syntax tree makes it easier to understand the changes to the code at a glance.\"}]\n33:[\"$\",\"p\",\"p-26\",{\"children\":\"With the rise of language models, structured editing may become a more natural fit for modern coding workflows, offering benefits that plain-text editing can't match.\"}]\n34:[\"$\",\"h3\",\"h3-5\",{\"children\":\"References\"}]\n35:[\"$\",\"p\",\"p-27\",{\"children\":[\"[1] Teitelbaum, T., \u0026 Reps, T. (1981). \",[\"$\",\"em\",\"em-0\",{\"children\":\"The Cornell program synthesizer: A syntax-directed programming environment\"}],\". \",[\"$\",\"em\",\"em-1\",{\"children\":\"Communications of the ACM, 24\"}],\"(9), 563–573. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/358746.358755\",\"children\":\"https://doi.org/10.1145/358746.358755\"}]]}]\n36:[\"$\",\"p\",\"p-28\",{\"children\":[\"[2] Resnick, M., Maloney, J., Monroy-Hernández, A., Rusk, N., Eastmond, E., Brennan, K., Millner, A., Rosenbaum, E., Silver, J., Silverman, B., \u0026 Kafai, Y. (2009). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Scratch: Programming for all.\"}],\" \",[\"$\",\"em\",\"em-1\",{\"children\":\"Communications of the ACM, 52\"}],\"(11), 60–67. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/1592761.1592779\",\"children\":\"https://doi.org/10.1145/1592761.1592779\"}]]}]\n37:[\"$\",\"p\",\"p-29\",{\"children\":[\"[3] Repenning, A., Webb, D. C., Koh, K. H., Nickerson, H., Miller, S. B., Brand, C., Her Many Horses, I., Basawapatna, A., Gluck, F., Grover, R., Gutierrez, K., \u0026 Repenning, N. (2015). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Scalable game design: A stra"])</script><script>self.__next_f.push([1,"tegy to bring systemic computer science education to schools through game design and simulation creation\"}],\". \",[\"$\",\"em\",\"em-1\",{\"children\":\"ACM Transactions on Computing Education, 15\"}],\"(2), Article 11, 1–31. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/2700517\",\"children\":\"https://doi.org/10.1145/2700517\"}]]}]\n38:[\"$\",\"p\",\"p-30\",{\"children\":[\"[4] \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://developers.google.com/blockly\",\"children\":\"https://developers.google.com/blockly\"}]]}]\n39:[\"$\",\"p\",\"p-31\",{\"children\":[\"[5] Omar, C., Voysey, I., Hilton, M., Aldrich, J., \u0026 Hammer, M. A. (2017). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Hazelnut: A bidirectionally typed structure editor calculus\"}],\". In \",[\"$\",\"em\",\"em-1\",{\"children\":\"Proceedings of the 44th ACM SIGPLAN Symposium on Principles of Programming Languages (POPL ’17)\"}],\" (pp. 86–99). Association for Computing Machinery. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3009837.3009900\",\"children\":\"https://doi.org/10.1145/3009837.3009900\"}]]}]\n3a:[\"$\",\"p\",\"p-32\",{\"children\":[\"[6] Beckmann, T., Rein, P., Ramson, S., Bergsiek, J., \u0026 Hirschfeld, R. (2023). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Structured editing for all: Deriving usable structured editors from grammars\"}],\". In \",[\"$\",\"em\",\"em-1\",{\"children\":\"Proceedings of the 2023 CHI Conference on Human Factors in Computing Systems (CHI ’23)\"}],\" (Article 595, pp. 1–16). Association for Computing Machinery. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3544548.3580785\",\"children\":\"https://doi.org/10.1145/3544548.3580785\"}]]}]\n3b:[\"$\",\"p\",\"p-33\",{\"children\":[\"[7] Voelter, M. (2010). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Implementing feature variability for models and code with projectional language workbenches\"}],\". In \",[\"$\",\"em\",\"em-1\",{\"children\":\"Proceedings of the 2nd International Workshop on Feature-Oriented Software Development (FOSD ’10)\"}],\" (pp. 41–48). Association for Computing Machinery. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/1868688.1868695\",\"children\":\"https://doi.org/10.1145/1868688.1868695\"}"])</script><script>self.__next_f.push([1,"]]}]\n3c:[\"$\",\"p\",\"p-34\",{\"children\":[\"[8] Hempel, B., Lubin, J., Lu, G., \u0026 Chugh, R. (2018). \",[\"$\",\"em\",\"em-0\",{\"children\":\"Deuce: a lightweight user interface for structured editing\"}],\". In \",[\"$\",\"em\",\"em-1\",{\"children\":\"Proceedings of the 40th International Conference on Software Engineering (ICSE '18)\"}],\" (pp. 654–664). Association for Computing Machinery. \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://doi.org/10.1145/3180155.3180165\",\"children\":\"https://doi.org/10.1145/3180155.3180165\"}]]}]\n3d:[\"$\",\"h3\",\"h3-6\",{\"children\":\"About the Author\"}]\n3e:[\"$\",\"p\",\"p-35\",{\"children\":\"Julian Kalitzke is a Master's student in Computer Science at ETH Zurich focused on Algorithm Design and Theoretical Computer Science. During his Bachelor's degree at TU Munich, he worked on language design, creating a domain-specific language for programming FPGAs.\"}]\n3f:[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L40\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Julian Kalitzke\"}],\", a student of the UCPI 2025 seminar.\"]}]}]\n"])</script><script>self.__next_f.push([1,"f:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nb:null\n"])</script><script>self.__next_f.push([1,"d:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"12:\"$d:metadata\"\n"])</script></body></html>
