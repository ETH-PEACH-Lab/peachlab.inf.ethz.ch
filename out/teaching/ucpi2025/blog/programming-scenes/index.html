\":\"Developer Community\"}]}]\n15:[\"$\",\"li\",\"accessibility\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/accessibility/\",\"className\":\"blog-nav-link \",\"children\":\"Accessibility\"}]}]\n16:[\"$\",\"li\",\"week-Programming Interface for Learners\",{\"className\":\"blog-nav-week-item\",\"children\":[\"$\",\"div\",null,{\"className\":\"blog-nav-week-label\",\"children\":\"Programming Interface for Learners\"}]}]\n17:[\"$\",\"li\",\"code-clustering\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-clustering/\",\"className\":\"blog-nav-link \",\"children\":\"Code Clustering\"}]}]\n18:[\"$\",\"li\",\"code-tutorials\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/code-tutorials/\",\"className\":\"blog-nav-link \",\"children\":\"Code Tutorials\"}]}]\n19:[\"$\",\"li\",\"no-code-environment\",{\"className\":\"blog-nav-item\",\"children\":[\"$\",\"a\",null,{\"href\":\"/teaching/ucpi2025/blog/no-code-environment/\",\"className\":\"blog-nav-link \",\"children\":\"No Code Environment\"}]}]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"main\",null,{\"className\":\"blog-content\",\"children\":[[\"$\",\"article\",null,{\"className\":\"prose prose-neutral max-w-none custom-blog-styles\",\"children\":[[\"$\",\"$1\",\"h2-0\",{\"children\":[[\"$\",\"h2\",null,{\"children\":\"Building Worlds with Prompts\"}],[\"$\",\"p\",null,{\"className\":\"blog-byline\",\"children\":[\"by \",\"Omar Hammoud\"]}]]}],\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[\"Have you ever tried to describe an intricate fantasy landscape to someone and found yourself running out of words? Now imagine trying to communicate that vision to an AI: sketching a little here, adjusting a region there, refining your prompt with each iteration. That's the promise of \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"WorldSmith\"}],\", a tool that sits at the intersection of creative coding, generative AI, and human-computer interaction [1].\"]}],\"\\n\",[\"$\",\"h3\",\"h3-0\",{\"children\":\"Why World Building Is Hard\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"children\":\"When storytellers, game designers, or even filmmakers sit down to build fictional worlds, they face a peculiar challenge. Creating rich worlds demands both artistic vision and technical execution. However, for independent creators like students and indie game developers, these barriers have been prohibitively high.\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"children\":\"The digital landscape makes this even harder: a static image doesn't capture hierarchy and relationships. A single text-to-image prompt might generate something visually striking, but rarely captures the nuance of what you actually want. You want to say \\\"this city is medieval but with advanced technology\\\", or \\\"these characters should feel related despite being from different cultures\\\". Text alone struggles with these layered concepts.\"}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"children\":\"Most generative AI tools hit a wall here. They give you a \\\"click once\\\" experience: write a prompt, get an image, done. If you don't like it, you start over. No history, no iteration, no way to build on your ideas incrementally. This disconnect between creative intention and AI output has been a persistent frustration for designers using these models.\"}],\"\\n\",[\"$\",\"h3\",\"h3-1\",{\"children\":\"Introducing WorldSmith: Multi-Modal Iterative Prompting\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"children\":\"WorldSmith, developed by researchers at Autodesk (Dang, Brudy, Fitzmaurice, and Anderson, 2023), challenges this paradigm. The core insight is simple but powerful: the best way to co-create with generative AI is to give the system multiple languages for expression. Not just text, but also sketches, regions, and visual hierarchy.\"}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"children\":\"The tool works by decomposing your world into a grid of tiles (typically four), each representing a different region of your fictional world. Within each tile, you can engage in three kinds of interaction:\"}],\"\\n\",[\"$\",\"ol\",\"ol-0\",{\"children\":[\"\\n\",[\"$\",\"li\",\"li-0\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Text-to-Image Generation\"}],\": Describe what you want, as with any AI tool. But the difference is that your prompt builds on previous iterations.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-1\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Region-Based Filling\"}],\": Outline specific areas on the canvas and describe what should go there. Want a castle on the left side and a forest on the right? Draw rough regions and let the AI respect those boundaries.\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",\"li-2\",{\"children\":[\"\\n\",[\"$\",\"p\",\"p-0\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Sketching\"}],\": Provide rough sketches with annotations. This is especially powerful for creatives who think visually.\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\"]}],\"$L32\"]}]\n"])</script><script>self.__next_f.push([1,"33:I[32782,[\"2951\",\"static/chunks/2951-4ad1c7a7b17e1ac3.js\",\"7650\",\"static/chunks/app/teaching/ucpi2025/blog/%5Bslug%5D/page-af55958027f2bd2a.js\"],\"default\"]\n1b:[\"$\",\"p\",\"p-6\",{\"children\":\"But the real innovation lies in the ytree-based history system. Every edit, every regeneration is recorded as a checkpoint. You can revert to earlier versions or branch off into new directions, without losing your work. This fundamentally changes how iteration feels: instead of a linear \\\"accept or reject\\\" loop, it becomes a tree of creative possibilities.\"}]\n1c:[\"$\",\"h3\",\"h3-2\",{\"children\":\"What the User Study Revealed\"}]\n1d:[\"$\",\"p\",\"p-7\",{\"children\":\"The researchers tested WorldSmith with 13 novice world builders in a study.\"}]\n1e:[\"$\",\"p\",\"p-8\",{\"children\":\"Most participants, despite having no prior experience with the tool, could compose complex and multi-layered worlds. Some combined text descriptions with hand sketches, others created hierarchical compositions (establishing overall mood first, then refining regions). Most of them took advantage of the branching history to explore variations. Crucially, users found the \\\"non-textual interactions\\\" particularly expressive. Sketches and region-based prompts conveyed nuance that text alone could not.\"}]\n1f:[\"$\",\"p\",\"p-9\",{\"children\":\"This points to a broader truth often missed in the rush to deploy generative AI: generative models aren't best used as replacements for human creativity; they're best used as collaborators. The tool that gives you the richest interaction modalities will yield richer results. A tool that constrains you to typing is a tool that constrains your ability to express what's actually in your head.\"}]\n20:[\"$\",\"h3\",\"h3-3\",{\"children\":\"The Broader Ecosystem: Beyond World Building\"}]\n21:[\"$\",\"p\",\"p-10\",{\"children\":\"Stepping back, it's worth noting what WorldSmith sits within. Generative AI has become present in creative tools. Image generation (DALL-E, Midjourney, Stable Diffusion) has spawned a growing ecosystem of tools designed to help collaboration wit"])</script><script>self.__next_f.push([1,"h these models more effectively. A recent study found that even modest adjustments to prompts substantially improved the similarity of regenerated images to targets, validated through both human perception and quantitative metrics [2].\"}]\n22:[\"$\",\"p\",\"p-11\",{\"children\":\"Other tools exist for example to assist fashion designers in generating design variations, or offer interfaces for exploratory creative work [3]. The common pattern across all of them: expressivity and control matter more than convenience.\"}]\n23:[\"$\",\"h3\",\"h3-4\",{\"children\":\"Looking Forward: What's Next for Creative Coding\"}]\n24:[\"$\",\"p\",\"p-12\",{\"children\":\"Here's where things get speculative but worth thinking about:\"}]\n25:[\"$\",\"p\",\"p-13\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Collaborative Worldbuilding at Scale\"}],[\"$\",\"br\",\"br-0\",{}],\"\\nImagine a future where multiple storytellers use WorldSmith simultaneously, each working on different regions of a shared world. The tool could merge their edits and manage conflicts. This would make the creation of large-scale fictional universes more accessible, something currently reserved for well-funded studios with teams of concept artists.\"]}]\n26:[\"$\",\"p\",\"p-14\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Embodied Creative Interfaces\"}],[\"$\",\"br\",\"br-0\",{}],\"\\nToday, we sketch on a 2D canvas. But AR/VR could allow creators to stand inside their worlds as they build them, making spatial relationships and scale intuitive in ways a flat screen cannot. The same iterative-prompting paradigm could transfer to 3D environments, where you're walking through regions and adjusting them in real time.\"]}]\n27:[\"$\",\"p\",\"p-15\",{\"children\":[[\"$\",\"strong\",\"strong-0\",{\"children\":\"Integration with Narrative and Logic\"}],[\"$\",\"br\",\"br-0\",{}],\"\\nCharacters have relationships and histories. Future tools could link visual generation to narrative databases, ensuring that the world created is consistent with the story being told. Imagine a system where changing a character's background automatically adjusts the"])</script><script>self.__next_f.push([1," visual appearance of the world they inhabit, or where inconsistencies between narrative and visual elements are flagged automatically.\"]}]\n28:[\"$\",\"h3\",\"h3-5\",{\"children\":\"Closing Thoughts\"}]\n29:[\"$\",\"p\",\"p-16\",{\"children\":\"WorldSmith won't replace concept artists, and it shouldn't. By offering multiple modalities (text, sketching, regional composition) and by making iteration reversible, it treats generative AI not as a black box but as a collaborative partner.\"}]\n2a:[\"$\",\"p\",\"p-17\",{\"children\":[\"For computer science students and creative technologists, the lesson is clear: \",[\"$\",\"strong\",\"strong-0\",{\"children\":\"the future of creative tools isn't about \\\"more AI,\\\" it's about better interaction design.\"}],\" The challenge isn't building a better image generator (that problem is largely solved), it's designing interfaces that let humans and AI systems think together.\"]}]\n2b:[\"$\",\"p\",\"p-18\",{\"children\":\"If you've ever struggled to turn a vague idea into a concrete visual, WorldSmith could help. It shows that the future of programming isn't less human, it's more human.\"}]\n2c:[\"$\",\"h3\",\"h3-6\",{\"children\":\"References\"}]\n2d:[\"$\",\"p\",\"p-19\",{\"children\":[\"\\\\[1] Dang, H., Brudy, F., Fitzmaurice, G., \u0026 Anderson, F. (2023). Worldsmith: Iterative and expressive prompting for world building with a generative AI. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 36th Annual ACM Symposium on User Interface Software and Technology\"}],\" (pp. 1-17). \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3586183.3606772\",\"children\":\"https://dl.acm.org/doi/10.1145/3586183.3606772\"}]]}]\n2e:[\"$\",\"p\",\"p-20\",{\"children\":[\"\\\\[2] Trinh, K., et al. (2025). A picture is worth a thousand prompts? Efficacy of iterative prompt refinement for image regeneration. \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the IJCAI 2025\"}],\". \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://arxiv.org/abs/2%C2%A8504.20340\",\"children\":\"https://arxiv.org/abs/2504.20340\"}]]}]\n2f:[\"$\",\"p\",\"p-21\",{\"children\":[\"\\\\[3] ACM UIST. (2023). Spellburst: A node-based interface fo"])</script><script>self.__next_f.push([1,"r exploratory creative coding. In \",[\"$\",\"em\",\"em-0\",{\"children\":\"Proceedings of the 36th Annual ACM Symposium on User Interface Software and Technology\"}],\". \",[\"$\",\"a\",\"a-0\",{\"href\":\"https://dl.acm.org/doi/10.1145/3586183.3606719\",\"children\":\"https://dl.acm.org/doi/10.1145/3586183.3606719\"}]]}]\n30:[\"$\",\"h3\",\"h3-7\",{\"children\":\"About the Author\"}]\n31:[\"$\",\"p\",\"p-22\",{\"children\":\"Omar is a computer science student specializing in database technologies and systems security.\"}]\n32:[\"$\",\"div\",null,{\"style\":{\"marginTop\":\"60px\",\"borderTop\":\"1px solid #eaeaea\",\"paddingTop\":\"20px\"},\"children\":[\"$\",\"$L33\",null,{\"label\":false,\"type\":\"secondary\",\"children\":[\"This blog post was written by \",[\"$\",\"b\",null,{\"children\":\"Omar Hammoud\"}],\", a student of the UCPI 2025 seminar.\"]}]}]\n"])</script><script>self.__next_f.push([1,"f:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nb:null\n"])</script><script>self.__next_f.push([1,"d:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"PEACH Lab\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Programming, Education, and Computer-Human Interaction Lab, ETH Zurich\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"12:\"$d:metadata\"\n"])</script></body></html>
